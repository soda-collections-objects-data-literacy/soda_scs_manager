# Structure pages
# Main menu order (by weight): Home (standard.front_page, 0), Dashboard, Projects,
# Documentation, Notifications, then Administration. Issue Report is in the Footer
# menu (see soda_scs_manager_install()). Anonymous users only see
# soda_scs_manager.anonymous_documentation; authenticated users only see
# soda_scs_manager.menu.documentation — see soda_scs_manager_preprocess_menu().
soda_scs_manager.menu.dashboard:
  title: 'Dashboard'
  description: 'Your applications'
  menu_name: main
  route_name: soda_scs_manager.dashboard
  weight: 10
  requirements:
    _permission: 'soda scs manager user'

soda_scs_manager.menu.projects:
  title: 'Projects'
  description: 'Collaboration projects and memberships'
  menu_name: main
  route_name: soda_scs_manager.projects
  weight: 11
  requirements:
    _permission: 'soda scs manager user'

# Href from DocumentationInternalPathMenuLink; route for active trail in discovery alter.
soda_scs_manager.menu.documentation:
  class: Drupal\soda_scs_manager\Plugin\Menu\DocumentationInternalPathMenuLink
  title: 'Documentation'
  description: 'Documentation'
  menu_name: main
  route_name: entity.node.canonical
  route_parameters:
    node: '1'
  weight: 12

soda_scs_manager.menu.administration:
  title: 'Administration'
  description: 'Administration'
  menu_name: main
  route_name: soda_scs_manager.administration
  weight: 30
  requirements:
    _permission: 'soda scs manager admin'

soda_scs_manager.menu.issue_report:
  title: 'Issue Report'
  description: 'Report an issue'
  menu_name: footer
  route_name: soda_scs_manager.issue_report
  weight: 40
  requirements:
    _permission: 'soda scs manager user'

soda_scs_manager.menu.notifications:
  title: 'Notifications'
  description: 'Project invitations'
  menu_name: main
  route_name: soda_scs_manager.notifications
  weight: 13
  requirements:
    _permission: 'soda scs manager user'

# Anonymous visitors: Documentation with public-facing title attribute. Hidden for
# logged-in users in preprocess so they use soda_scs_manager.menu.documentation.
soda_scs_manager.anonymous_documentation:
