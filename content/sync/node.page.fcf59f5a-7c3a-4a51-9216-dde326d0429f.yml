    value: '<h2>Acceptance of the Terms</h2><p><strong>THESE SERVICE CONDITIONS FOR SODA SEMANTIC CO-WORKING SPACE</strong> ("Service Conditions" or "Conditions") <strong>form a binding contract</strong> and govern your use of and access to the services by you, your representatives and end users in connection with access to our free version of Soda Semantic Co-Working Space, our hosting environment for developers ("Soda Semantic Co-Working Space Free" or the "Services"). By accepting these Conditions—whether by accessing or using the Services, or by allowing an agent or end user to access or use the Services—you agree to these Conditions. If you accept these Conditions on behalf of a company, organisation or other legal entity (a "Legal Entity"), you accept these Conditions on behalf of that Legal Entity.You agree to these Conditions for that entity and represent to ?SODa? that you are authorised to bind that entity and its affiliates to these Conditions. In that case, the terms "Subscriber", "You", "Your" or similar terms in capitals refer to that Legal Entity and its affiliates. If you do not have such authority or do not agree to these Conditions, you may not accept these Conditions and may not use the Services.We may change these Conditions or any part of them at any time, including by adding or removing terms. Such changes, additions or removals take effect as soon as they are published. Your continued use of the Services after publication is deemed acceptance of those changes, additions or removals.</p><h2>The Services</h2><p>We provide you with access to the Services in accordance with these Conditions.</p><h3>Availability and support</h3><ul><li data-list-item-id="e24de948e7029b39db46801d71b77d07a">The Services are provided on a <strong>limited basis</strong> and <strong>without any warranties</strong>.</li><li data-list-item-id="e5596588cbf9c2665b49f114c5cc31b78">We <strong>do not provide support</strong> for migrating data from Soda Semantic Co-Working Space.</li><li data-list-item-id="eb550e924e68306a9c1c44f1602b6d365">You <strong>do not receive</strong> any object or source code in connection with the Services.</li></ul><h3>Ownership</h3><p><strong>?SODa?</strong>, its licensors and its service providers own and retain all rights, title and interest in the Services, including all related intellectual property rights. Except for the limited rights expressly granted to you, no rights in the Services are granted to you.</p><h3>Soda Semantic Co-Working Space Free</h3><p>Soda Semantic Co-Working-Space Free <strong>is not intended for production sites</strong>. It:</p><ul><li data-list-item-id="efaba409545c9c19c80f349d25bfd63de">has <strong>no production environment</strong>,</li><li data-list-item-id="eeeec68f9570923c4c0f8178d9bb84807">offers <strong>limited storage</strong> (1000 MB for codebase, Drupal database, triple store and file system), and</li><li data-list-item-id="e47a5b0d3ddd014f3c434027d5f0c93d4"><strong>does not allow custom domains</strong>.</li></ul><p>SODa Semantic Co-Working Space Free is a <strong>shared development environment</strong> intended only for testing and development with limited impact. If your use of the shared development environment adversely affects server performance or if you regularly use what we consider an excessive share of shared server capacity (CPU, memory, disk, PHP processes), your access to SODa Sematnic Co-Working Space may be terminated.</p><h3>Discontinuation and suspension</h3><p>We may <strong>discontinue the Services</strong> at any time at our sole discretion without liability. We may give you advance notice of such discontinuation but are not obliged to do so. We may <strong>suspend</strong> your use of the Services <strong>immediately</strong> if you breach these Conditions.</p><h3>No backup or support</h3><p>We will <strong>not</strong> perform any data backup as part of the Services and will <strong>not</strong> provide you with support during your use of SODa Semantic Co-Working Space.</p><h3>Warranties</h3><p>We <strong>disclaim all warranties</strong> of any kind, whether express or implied, statutory or otherwise, and <strong>?SODa?</strong> hereby disclaims all implied warranties and conditions, including but not limited to implied warranties of merchantability, fitness for a particular purpose and non-infringement. We do <strong>not</strong> promise that:</p><ol><li data-list-item-id="ec12441c8ae0c635d0aefda969e606a87">use of the Services will be uninterrupted, error-free or completely secure, or</li><li data-list-item-id="e07545e1da21ad9513d434cb85d747f3a">the Services will meet your requirements or expectations.</li></ol><h2>Your Obligations</h2><h3>Prohibited use and tests</h3><ul><li data-list-item-id="ee68e5e9a5a122bd381a5c0be58661795">You will <strong>not</strong> perform load tests or vulnerability tests on websites hosted on SODa Semantic Co-Working Space.</li></ul><h3>Compliance</h3><ul><li data-list-item-id="e5453a47f00778bad532f10aa14fd0a1c">You must comply with the <strong>laws</strong> applicable to your use of the Services.</li><li data-list-item-id="ed9cc6c58b3703ecd2ee81fafcf8f2063">You must comply with the <strong>SODa Semantic Co-Working Space privacy policy</strong>, which you can find in our privacy policy.</li></ul><h3>Cooperation and information</h3><ul><li data-list-item-id="eed2f333d4127b9c8b8801d70b16d6982">You must <strong>cooperate</strong> in investigating failures of the Services, security issues and suspected breaches of these Conditions.</li><li data-list-item-id="e0ac693e694c7bd10cd845cfa55ae7eb6">You must provide us with <strong>accurate information</strong>, including but not limited to account authorisations and billing and other account information, where applicable.</li></ul><h3>Access and use</h3><ul><li data-list-item-id="ee27122bc9d11253e494497971996ac41">You may <strong>not</strong> allow or assist others to access or use the Services for any purpose other than operating the Services for <strong>internal demonstration purposes</strong>.</li><li data-list-item-id="e30cd1bfc2f4cb3ddaa501a9f92aaf789">You are <strong>not</strong> permitted to copy or distribute the Services.</li><li data-list-item-id="e1b04df2448741fb37a3480a171ea6f5e">You may <strong>not</strong> use the Services to provide services to third parties or to <strong>resell</strong> the Services.</li></ul><h3>Security</h3><p>You must implement <strong>appropriate security measures</strong> in connection with your use of the Services. For the Services, this includes <strong>encrypting PII</strong> that is transmitted to or from the Services.</p><h3>Prohibited technical actions</h3><p>You may <strong>not</strong>, directly or indirectly:</p><ol><li data-list-item-id="e4f513e9ef438ee791f0bb0331d04400d"><strong>Reverse engineer</strong>, decompile, disassemble or otherwise attempt to discover the source code or underlying ideas or algorithms of the Services.</li><li data-list-item-id="e6b78b2be8069c8978d4b5210f92cb630"><strong>Modify</strong>, translate or create derivative works of the Services.</li><li data-list-item-id="e8a093514fb01b64b910010b8963391cd"><strong>Rent</strong>, lease, distribute, sell, resell, assign or otherwise transfer rights in the Services.</li><li data-list-item-id="efadbeeb00b2c67949fe5ea9ef9c64396">Use the Services for <strong>timesharing</strong> or <strong>service bureau</strong> use.</li><li data-list-item-id="e8f7956488a77383fbf72aae03ad80b49"><strong>Alter</strong>, remove or conceal any copyright, trademark or other proprietary notices.</li><li data-list-item-id="e6f8b8da7d92e054a6cce3d198d7afbf3"><strong>Publish or disclose</strong> any evaluation of the Services to third parties without prior written consent from <strong>?SODa?</strong></li><li data-list-item-id="e8414063c224b6010173e225001b31bfe">Use the Services to create a <strong>competing product or service</strong>.</li><li data-list-item-id="eaa9f6b7dfe72c686c8531480a26ac0be"><strong>Copy</strong> any features or graphics of the Services.</li></ol><h3>Email and marketing</h3><ul><li data-list-item-id="e943a76ee5b99e41990d139588abe6a57">You may <strong>not</strong> register for the Services using email addresses from <strong>disposable email providers</strong> such as mailinator.com, 10minuteemail.com, guerillamail.com, yotmail.com, tempinbo.com and instantemail.com.</li><li data-list-item-id="e3dc73c7e763cf4854851643b53692dc5">You undertake to comply with all applicable laws, rules and regulations, including the <strong>CAN-SPAM Act</strong>.</li></ul><h2>Your Rights in Your Website Content</h2><p>You represent to us that you have <strong>all rights</strong> in your content (as defined herein) that are necessary to use the Services without infringing the rights of copyright holders, violating applicable law or breaching the terms of any licence or agreement to which you are bound.<strong>"Content"</strong> means all data, records, files, images, graphics, audio, video, photos, reports, forms and other content and materials in any format that are submitted, stored, posted, displayed, transmitted or otherwise used by you with the Services.</p><ul><li data-list-item-id="eb8428e1e911452c4ad7b7c5ac577655f">You <strong>retain ownership</strong> of all rights, title and interest in and to all your content.</li><li data-list-item-id="eb954c3f2841236d6be790990e55cf514">You permit us to <strong>host your website</strong> and grant us the right to store, use and disclose your content <strong>solely</strong> for the purpose of providing the Services.</li><li data-list-item-id="e25bf36b9409d1035fe41712d6eaed905">This permission lasts only <strong>for as long as you continue to use the Services</strong>.</li></ul><h2>Unauthorised Access to Your Content or Use of the Services</h2><p>We are <strong>not liable</strong> to you or any third party for:</p><ul><li data-list-item-id="ea4e5f7ec53ac4fcd13c979f4070d09af">unauthorised access to your content, or</li><li data-list-item-id="e450d6d0764426a090d1e8cd54da49e78">unauthorised use of the Services.</li></ul><p>You are <strong>responsible</strong> for the use of the Services by:</p><ul><li data-list-item-id="e9db803822a56ce954627d588a800dc82">each of your employees,</li><li data-list-item-id="ec23302de80fe1108ed9cac358702a952">all persons you authorise to use the Services,</li><li data-list-item-id="eaa7949439e3a49c0703a57dd0c641828">each person to whom you grant access to the Services, and</li><li data-list-item-id="eb107b77eb6ffd9436455ddfeb225c93f">each person who obtains access to your content or the Services as a result of your failure to take adequate security measures,</li></ul><p>even if that access was not authorised by you.</p><h2>Copyright Law</h2><p>We respect the <strong>intellectual property rights</strong> of others and expect you to do the same. We will respond to notices regarding copyright infringement in accordance with the German <strong>Act on Copyright and Related Rights</strong> (Urheberrechtsgesetz – UrhG). Our response may include removing or blocking access to allegedly infringing content and blocking your access to our Services if we do not receive a satisfactory response from you after a notice of infringement has been received.</p><h3>Copyright infringement notices</h3><p>If you believe that content on our Services infringes copyright, you (the <strong>"reporting party"</strong>) are invited to send a notice of copyright infringement to the designated representative containing:</p><p>Item</p><p>Requirement</p><p><strong>(a)</strong></p><p>A description of the copyrighted work or material that the reporting party claims is infringed.</p><p><strong>(b)</strong></p><p>The URL at which the allegedly infringing material is located in our Services, or a sufficiently detailed description of its location so that we can identify it.</p><p><strong>(c)</strong></p><p>The reporting party''s contact details, including address, telephone number and email address.</p><p><strong>(d)</strong></p><p>A written statement by the reporting party in good faith that the disputed use has not been authorised by the copyright owner, its representative or the law.</p><p><strong>(e)</strong></p><p>A statement by the reporting party under penalty of perjury that the information in the notice is accurate and that the reporting party is either the copyright owner or authorised to submit the complaint on behalf of the copyright owner.</p><p><strong>(f)</strong></p><p>The reporting party''s electronic or physical signature.</p><p>&nbsp;</p><p>&nbsp;</p><h3>Designated representative</h3><p>The copyright officer designated by ?SODa? to receive notices of claimed infringement may be contacted as follows: <strong>email to the board of ?SODa? Please note:</strong></p><ul><li data-list-item-id="e9dd8725f2eb429e32f61480633ba6350">Your notice may be <strong>invalid</strong> if you do not meet all requirements of this section.</li><li data-list-item-id="e83db2d260b9331e88616aae80d537274">We may <strong>not</strong> be able to respond to removal requests.</li><li data-list-item-id="e534ba13944c1aadc97f76408dffe1bbe">Please also note the <strong>General Data Protection Regulation (GDPR)</strong>: https://dsgvo-gesetz.de/</li></ul><h2>Termination</h2><ul><li data-list-item-id="ef3e69a4b0d4dbc5cbef3ec10e90f1f7d">We may <strong>terminate this agreement</strong> at any time at our sole discretion.</li><li data-list-item-id="ea5222b41024983b480a7fbaee79362f8">We will give you <strong>advance notice in writing</strong> by either publishing a notice on our website or contacting you directly.</li><li data-list-item-id="e1decb7958f98fddbccfeb8244a3fcf29">After such termination:</li><li data-list-item-id="eea3a034c7e2e50959a64eee3c21bf177">you will <strong>no longer have access</strong> to the Services, and</li><li data-list-item-id="eb737cf338d2e064d39db7ec154b836f4"><strong>SODa Semantic Co-Working Space will delete</strong> all content located in the Services environment.</li></ul><h2>Confidential Information</h2><ul><li data-list-item-id="e34e49ba3d2f4afa5ae50c169156059ff">Each of us agrees <strong>not to use</strong> the other''s confidential information except as required by law or in response to a subpoena or other legal process.</li><li data-list-item-id="e5b1ee4568af393f6411df587084494e7">Each of us agrees to <strong>notify the other seven (7) days in advance</strong> (where legally permitted) before disclosing confidential information.</li><li data-list-item-id="e5f2275503459539fabf4b3f278d0f4af">We may use your <strong>registration information</strong> to contact you for <strong>marketing purposes</strong>.</li></ul><h2>Indemnification</h2><p>You agree to <strong>indemnify and hold harmless</strong> us and ?SODa?, its board, representatives, members, partners, employees etc. from any claims or demands (including reasonable legal costs and any damages, fines or other amounts imposed on us) raised by third parties due to or in connection with:</p><ul><li data-list-item-id="e2cd8eb6804c0fb9773b2f3d20489cac7">your content,</li><li data-list-item-id="ea8636ccc94d9c48068382ce10ab23088">improper use of the Services,</li><li data-list-item-id="e55171e7fb0a7534df9ea649e2fe9c5b7">breach of these Conditions,</li><li data-list-item-id="eedb07e7a888c1d31cd2733f2f25a1c9e">your gross negligence or intentional misconduct, or</li><li data-list-item-id="e0af5c8ac3e398bd8b950c33c24efcbf2">violation of law or of another''s rights.</li></ul><p>Your obligations under this subsection include claims arising from the acts or omissions of:</p><ul><li data-list-item-id="ea50d69826460adf1003857a9724443d8">your employees and representatives,</li><li data-list-item-id="e3e667fd980f8532e55006718f83301f2">any other person to whom you have granted access to the Services, and</li><li data-list-item-id="eb331269862e6322ad64d250edcb141fb">any person who obtains access to the Services because you failed to take adequate security measures,</li></ul><p>even if those persons'' acts or omissions were not authorised by you.<strong>If you resell the Services</strong>, the indemnification obligation applies. The claims referred to above also include <strong>all claims of your customers or end users</strong> arising from your resale of the Services.</p><h3>Defence and costs</h3><ul><li data-list-item-id="e052d8047d7817ff5f4c0d4e050b43be1">We will instruct <strong>legal counsel</strong> to defend the claim, provided that such decisions are reasonable and must be communicated to you promptly.</li><li data-list-item-id="e43ceca44389e5039945a04fcdf5016e2">You must comply with our <strong>reasonable requests</strong> for assistance and cooperation in defending the claim.</li><li data-list-item-id="e73f0424a8662f31eb49352f185ffa46a">You must pay the <strong>costs due under this section</strong> as soon as they are incurred by us.</li></ul><h2>Limitation of Liability</h2><ul><li data-list-item-id="ebf3abda60b3b7642da35884c43b182f0">We are <strong>not liable</strong> to you for any <strong>special, indirect, incidental, consequential, punitive, exemplary or similar damages</strong>, including but not limited to lost revenue or profits, arising in any way from or in connection with these Conditions, <strong>even if</strong> we have been advised of the possibility of such damages.</li><li data-list-item-id="e6cfcd472dd0e35e68515d5e5e0e198c1">We are <strong>not liable</strong> to you for <strong>lost content</strong>.</li></ul><h2>Prohibited Groups, Export</h2><h3>Prohibited entities</h3><p>You represent and warrant that you are <strong>not</strong> active in:</p><ul><li data-list-item-id="e32c680855feabb789288192a8dd38896">the <strong>Bundeswehr</strong>,</li><li data-list-item-id="e4610f3b367349ac87ff9c46a554c7669">other explicitly <strong>security-related or sensitive</strong> social, economic or political entities or organisations (e.g. critical infrastructure, state finances, corresponding areas of politics),</li><li data-list-item-id="e8185593f1c694c0d76bba6217ab545c5"><strong>secured left- or right-wing extremist</strong> or <strong>prohibited</strong> associations, or</li><li data-list-item-id="e0697ddd58959892c96f8d2fb4cc946ec">associations <strong>monitored by the Office for the Protection of the Constitution</strong>.</li></ul><h3>Export compliance</h3><ul><li data-list-item-id="e93745cbc0f0fb21d18d3ee298b56de87">You agree to comply with all applicable laws regarding the <strong>export of technical data</strong> from Germany or the country in which you reside.</li><li data-list-item-id="e4e7eca40cd06ae5f92c65b002b748e67">You acknowledge that the Services may be subject to <strong>German export control and sanctions law</strong> (including the Administrative Regulation on Export Controls — "Export Controls") and that you will comply with <strong>all applicable Export Controls</strong>.</li></ul><h2>Definitions</h2><h3>"Confidential Information"</h3><p>All information that one party discloses to the other, whether before or after acceptance of these Conditions, that the recipient would reasonably consider confidential, including:</p><ul><li data-list-item-id="e113d0c536c96b2dfa61ae19b706cb45c"><strong>(i)</strong> For <strong>you</strong>: all information transmitted to or from or stored in the Services.</li><li data-list-item-id="e464f095529bcec058ea95248cf6a3887"><strong>(ii)</strong> For ?SODa?: unpublished prices and other terms of use, audit and security reports, product development plans and other protected information or technology.</li><li data-list-item-id="eba2155a24e35196f91c9f271f3ed6a8c"><strong>(iii)</strong> For <strong>both parties</strong>: information marked as confidential or otherwise conspicuously designated.</li></ul><p>This also includes information independently generated by one party without reference to the other''s confidentiality, or information arising from one party''s breach of an agreement or law; such information <strong>does not</strong> constitute "Confidential Information" of the other party.</p><h3>"PII"</h3><ul><li data-list-item-id="e07a63a19e0a2d085cfef79be2863f52a"><strong>(i)</strong> Any combination of information that can identify a person using sensitive and non-public financial, health or other data; or an attribute such as a combination of the person''s name, address or telephone number with the person''s social media, identification number or other government-issued number, financial account number, date of birth, address, biometric data, mother''s maiden name or other personally identifiable information; or</li><li data-list-item-id="ee196ec9443c97d4637cc685e6c3f4224"><strong>(ii)</strong> <strong>"Personal data"</strong> as defined in <strong>Article 4 of the GDPR</strong>.</li></ul><h2>General</h2><h3>Assignment</h3><p>You may <strong>not assign</strong> these Conditions to another party.</p><h3>Governing law</h3><p>These Conditions are governed by the <strong>laws of the Commonwealth of Massachusetts</strong> without regard to its conflict of laws rules.</p><h3>Dispute resolution</h3><ul><li data-list-item-id="efb35f2fe1184071637e399b9766f2bcc">In the event of <strong>disputes or claims</strong> arising from this agreement, if they <strong>cannot be resolved within thirty (30) days</strong>, either party may submit a <strong>written request for mediation</strong> within one day.</li><li data-list-item-id="ec4e12b21a1a9fc2de3885b3fd4cbd922">If the dispute <strong>cannot be resolved by mediation</strong>, it will be resolved by <strong>binding arbitration</strong>.</li><li data-list-item-id="e369c79f396ff900637e040892f228a90">The arbitrator will be selected in accordance with the provisions of an agreed arbitration procedure.</li><li data-list-item-id="eda1fd863246bc2fe1c3d5c0a2d204bcc">The arbitrator <strong>may not</strong> award any <strong>non-monetary or equitable</strong> relief of any kind.</li><li data-list-item-id="e8e78f03096032daf898ce51c0ef9c65a">All aspects of the arbitration will be treated as <strong>confidential</strong> and will not be disclosed by either party except as required to comply with legal or regulatory requirements.</li><li data-list-item-id="e46ddafd79ef79d6ad2e3181024378712">The arbitral award may be <strong>enforced</strong> by any court of competent jurisdiction.</li></ul><h3>Costs</h3><ul><li data-list-item-id="e8207243c311587585e566b4b70ba35dd">Each party will bear <strong>its own costs</strong> of the arbitration.</li><li data-list-item-id="e72ecf791df90375ca4a93b5d6635c3fb">The <strong>mediator''s and arbitrator''s</strong> fees and expenses will be <strong>shared equally</strong>.</li></ul><h3>Severability</h3><ul><li data-list-item-id="e48556a0893e0fddeb8d7f461c016d1e3">If any part of these Conditions is held <strong>invalid or unenforceable</strong>, that part will be enforced to the extent permitted by law and the <strong>remainder</strong> of these Conditions will remain in full force and effect.</li><li data-list-item-id="ed5d0958a1ec8ecdcdebef8dc455aa2fb">If any part of these Conditions is held <strong>unenforceable</strong> by a court, the remainder will nevertheless remain in effect, and the unenforceable part will be <strong>reformed as far as possible</strong> to make it enforceable while remaining consistent with the business and financial objectives of the parties underlying these Conditions.</li></ul><h3>Relationship</h3><ul><li data-list-item-id="e70cbc62d1296163b31bf98110a2b7df2">Nothing herein is intended to create an <strong>agency, partnership or other form of joint venture</strong> between the parties.</li><li data-list-item-id="e193bbd0f38a50b4fef5ee689b23df849">The relationship between us is that of <strong>independent contractors</strong> and not of business partners.</li><li data-list-item-id="e6d53c6493b67d3df79007339c98d5b90"><strong>Neither</strong> of us is the other''s representative and <strong>neither</strong> of us has the right to bind the other in an agreement with a third party.</li></ul><h3>Statute of limitations</h3><p>You agree that, notwithstanding any law to the contrary, any claim or cause of action arising from or in connection with your use of our Services or these Conditions must be <strong>brought within one (1) year</strong> of the claim or cause of action arising or be <strong>forever barred</strong>.</p><h3>Class actions</h3><p>In <strong>no</strong> case may the claims of multiple persons be combined in any form through a <strong>class or representative action</strong> or similar proceeding.</p><h3>Enforcement and waiver</h3><p>Each of us may enforce our respective rights under these Conditions <strong>even if</strong> we have waived or failed to enforce that right or other rights in the past.</p><h3>Entire agreement</h3><p>These Conditions constitute the <strong>entire agreement</strong> between you and ?SODa? regarding WissKI Cloud.</p><p><strong>Berlin, 2026</strong></p>'
