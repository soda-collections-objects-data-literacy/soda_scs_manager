      value: '<h2>Akzeptanz der Bedingungen</h2><p><strong>DIESE SERVICEBEDINGUNGEN FÜR SODa Semantic Co-Working Space</strong> ("SERVICEBEDINGUNGEN" ODER "BEDINGUNGEN") <strong>STELLEN EINEN FÜR SIE VERBINDLICHEN VERTRAG DAR</strong> und regeln Ihre Nutzung und den Zugang zu den Diensten durch Sie, Vertreter und Endnutzer in Verbindung mit dem Zugang zu unserer kostenlosen Version der SODa Semantic Co-Working Space, die unsere Hosting-Umgebung für Entwickler ist ("SODa Semantic Co-Working Space FREE" oder die "DIENSTE").Durch die Annahme dieser Bedingungen, entweder durch den Zugriff auf oder die Nutzung der Dienste, oder durch die Autorisierung oder Erlaubnis eines Agenten oder Endnutzers, auf die Dienste zuzugreifen oder diese zu nutzen, erklären Sie sich mit diesen Bedingungen einverstanden. Wenn Sie diesen Bedingungen im Namen eines Unternehmens, einer Organisation oder einer anderen juristischen Person (ein "Rechtsträger") zustimmen, stimmen Sie diesen Bedingungen für diesen Rechtsträger zu.Sie erklären sich mit diesen Bedingungen für diese Einheit einverstanden und versichern dem SODa, dass Sie befugt sind, diese Einheit und ihre verbundenen Unternehmen an diese Bedingungen zu binden, in diesem Fall beziehen sich die Begriffe "Abonnent", "Sie", "Ihr" oder ein ähnlicher Begriff in Großbuchstaben auf diese juristische Person und seine verbundenen Unternehmen. Wenn Sie nicht über eine solche Befugnis verfügen oder wenn Sie mit diesen Bedingungen nicht einverstanden sind, dürfen Sie diese Bedingungen nicht akzeptieren und dürfen die Dienste nicht nutzen.Diese Bedingungen oder ein Teil davon können von uns jederzeit geändert werden, einschließlich der Hinzufügung oder Streichung von Bedingungen, und solche Änderungen, Hinzufügungen oder Streichungen werden sofort nach der Veröffentlichung wirksam. Ihre Nutzung der Dienste nach einer solchen Veröffentlichung gilt als Annahme dieser Änderungen, Ergänzungen oder Streichungen durch Sie.</p><h2>Die Dienste</h2><p>Wir stellen Ihnen den Zugang zu den Diensten gemäß den vorliegenden Bedingungen zur Verfügung.</p><ul><li data-list-item-id="e2088c7cb705312247d192539b3a5111e">Die Dienste sind nur <strong>begrenzt verfügbar</strong> und werden <strong>ohne jegliche Garantie</strong> bereitgestellt.</li><li data-list-item-id="ea6cb5c658ab94fbdb1617e9ad9512cf9">Wir bieten <strong>keine Unterstützung</strong> bei der Migration von Daten von der SODa Semantic Co-Working Space.</li><li data-list-item-id="edd72993eb35d67ab0544e65a817d064e">Sie erhalten <strong>keinen Objekt- oder Quellcode</strong> im Zusammenhang mit den Services.</li></ul><p>Der SODa, seine Lizenzgeber und seine Dienstleister besitzen und behalten sich alle Rechte, Titel und Interessen an den Services vor, einschließlich aller damit verbundenen Rechte an geistigem Eigentum. Vorbehaltlich der beschränkten Rechte, die Ihnen ausdrücklich gewährt werden, werden Ihnen keine Rechte an den Dienstleistungen gewährt.</p><h3>SODa Semantic Co-Working Space Free</h3><p>SODa Semantic Co-Working Space Free ist <strong>nicht für Produktionsseiten geeignet</strong>, hat keine Produktionsumgebung, bietet begrenzten Speicherplatz (1000 MB für Codebase, Drupal-Datenbank, Triple-Store und Dateisystem) und erlaubt keine benutzerdefinierten Domains. SODa Semantic Co-Working Space Free ist eine <strong>gemeinsam genutzte Entwicklungsumgebung</strong>, die nur für Tests und Entwicklungsaktivitäten mit geringen Auswirkungen geeignet ist.Sollte sich Ihre Nutzung der gemeinsamen Entwicklungsumgebung negativ auf die Serverleistung auswirken oder sollten Sie regelmäßig eine unserer Meinung nach übermäßige gemeinsame Serverkapazität (CPU, Speicher, Festplatte, PHP-Prozesse) in Anspruch nehmen, kann Ihr Zugang zu SODa Semantic Co-Working Space gekündigt werden.</p><ul><li data-list-item-id="ef35a9124a93c8e3c0dc88441130b3c5b">Wir können die Dienste <strong>jederzeit</strong> nach unserem alleinigen Ermessen <strong>ohne Haftung einstellen</strong>.</li><li data-list-item-id="ef6ad138a7334a083a55fdcba9c81ed42">Wir können Sie im Voraus über eine solche Einstellung informieren, aber Sie erkennen an, dass wir dazu nicht verpflichtet sind.</li><li data-list-item-id="ece2cf9b805829b428780292cf168455e">Wir können Ihre Nutzung der Dienste <strong>sofort aussetzen</strong>, wenn Sie gegen diese Bedingungen verstoßen.</li></ul><p>Wir werden im Rahmen der Dienste <strong>keine Datensicherung</strong> durchführen und Ihnen während der Nutzung der SODa Semantic Co-Working Space <strong>keinen Support</strong> bieten. Wir lehnen alle Garantien jeglicher Art ab, ob ausdrücklich oder stillschweigend, gesetzlich oder anderweitig, und der SODa schließt hiermit alle stillschweigenden Garantien und Bedingungen ab, einschließlich, aber nicht beschränkt auf stillschweigende Garantien der Marktgängigkeit, Eignung für einen bestimmten Zweck und Nichtverletzung von Rechten Dritter. Wir versprechen nicht, dass (i) die Nutzung der Dienste ununterbrochen, fehlerfrei oder vollständig sicher ist, oder (ii) die Dienste Ihre Anforderungen oder Erwartungen erfüllen werden.</p><h2>Ihre Verpflichtungen</h2><ul><li data-list-item-id="eb275dfe90576d6fb7ac13d2d3e226dd2">Sie werden <strong>keine Lasttests oder Schwachstellentests</strong> auf Websites durchführen, die auf SODa Semantic Co-Working Space gehostet werden.</li><li data-list-item-id="e9de2844639fdadc5cf2cf8723ae794b9">Sie müssen die für die Nutzung der Dienste geltenden <strong>Gesetze</strong> und die <strong>Datenschutzrichtlinien</strong> der SODa Semantic Co-Working Space einhalten, die Sie unter unserer Datenschutzrichtlinie finden.</li><li data-list-item-id="e4269a6ca3bcff73507d6e0cf1025f831">Sie müssen bei der <strong>Untersuchung</strong> von Ausfällen der Dienste, Sicherheitsproblemen und mutmaßlichen Verstößen gegen diese Bedingungen <strong>kooperieren</strong>.</li><li data-list-item-id="e331a640a0945d36cc0d32679771107dd">Sie müssen uns <strong>genaue Informationen</strong> zur Verfügung stellen, einschließlich, aber nicht beschränkt auf Kontoberechtigungen, Abrechnungs- und andere Kontoinformationen, falls dies zutrifft.</li><li data-list-item-id="e2ca1891ada509a292d1b4ceb0fdae2d7">Sie dürfen anderen <strong>nicht</strong> erlauben oder dabei helfen, auf die Dienste zuzugreifen oder sie für andere Zwecke zu nutzen als für die Ausführung der Dienste für <strong>interne Demonstrationszwecke</strong>.</li><li data-list-item-id="e89c34212bd21d729cbf05e29f2a1353b">Sie sind <strong>nicht berechtigt</strong>, die Dienste zu kopieren oder zu verbreiten.</li><li data-list-item-id="eec9447fa3230c176c682683515c50454">Sie dürfen die Dienste <strong>nicht</strong> nutzen, um andere Dienstleistungen für Dritte zu erbringen oder die Dienste weiterzuverkaufen.</li></ul><p>Sie müssen <strong>angemessene Sicherheitsvorkehrungen</strong> in Verbindung mit Ihrer Nutzung der Dienste treffen. Für die Dienste bedeutet dies die <strong>Verschlüsselung von PII</strong>, die an oder von den Diensten übertragen werden.Sie dürfen weder direkt noch indirekt:</p><ol><li data-list-item-id="e37ae1e6ebf408546855eb96eb44a91db">ein <strong>Reverse Engineering</strong> durchführen, dekompilieren, disassemblieren oder anderweitig versuchen, den Quellcode oder die zugrunde liegenden Ideen oder Algorithmen der Dienste herauszufinden;</li><li data-list-item-id="efe21e724ad1364a4f205c37dafe4f974">die Dienste zu <strong>modifizieren</strong>, zu <strong>übersetzen</strong> oder davon <strong>abgeleitete Werke</strong> zu erstellen;</li><li data-list-item-id="e4a5fb048d6d87d42d5170df90ed29bd8">die Dienste zu <strong>vermieten</strong>, zu <strong>verleasen</strong>, zu <strong>vertreiben</strong>, zu <strong>verkaufen</strong>, weiterzuverkaufen, abzutreten oder anderweitig Rechte an den Diensten zu übertragen;</li><li data-list-item-id="e6b74c1514d8c620732d7ebe198d60eca">die Dienste für <strong>Timesharing-</strong> oder Service-Bureau-Nutzung zu nutzen;</li><li data-list-item-id="e1d8cc97c2a753866e728a97e801382d0"><strong>Urheberrechte</strong>, <strong>Warenzeichen</strong> oder andere <strong>Eigentumsrechte-Vermerke</strong> zu ändern, zu entfernen oder zu verbergen;</li><li data-list-item-id="e8860824be5d3942b42f5360480e78532"><strong>ohne vorherige schriftliche Zustimmung</strong> vom SODa eine Bewertung der Dienste zu veröffentlichen oder an Dritte weiterzugeben;</li><li data-list-item-id="ead46b1efab9d20f29e0aecfb2cab03da">die Dienstleistungen zu nutzen, um ein <strong>konkurrierendes Produkt</strong> oder eine <strong>konkurrierende Dienstleistung</strong> zu erstellen; oder</li><li data-list-item-id="e6bca928f23af050a9dc33d6caf8b174d"><strong>Funktionen oder Grafiken</strong> der Dienste zu kopieren.</li></ol><p>Sie dürfen sich <strong>nicht</strong> mit E-Mail-Adressen von Anbietern von <strong>Wegwerf-E-Mail-Adressen</strong> für die Dienste registrieren, wie z. B. mailinator.com, 10minuteemail.com, guerillamail.com, yotmail.com, tempinbo.com und instantemail.com. Sie verpflichten sich, alle geltenden Gesetze, Regeln und Vorschriften, einschließlich des <strong>CAN-SPAM Act</strong>, einzuhalten.</p><h2>Ihre Rechte an Ihrem Website-Inhalt</h2><p>Sie versichern uns, dass Sie über <strong>alle erforderlichen Rechte</strong> an Ihren Inhalten (wie hierin definiert) verfügen, die Ihnen die Nutzung der Dienste ermöglichen, ohne die Rechte von Urheberrechtsinhabern zu verletzen, gegen geltende Gesetze zu verstoßen oder gegen die Bedingungen jeglicher Lizenz oder Vereinbarung zu verstoßen, an die Sie gebunden sind.<strong>"Inhalt"</strong> bezeichnet alle Daten, Aufzeichnungen, Dateien, Bilder, Grafiken, Audio, Video, Fotos, Berichte, Formulare und andere Inhalte und Materialien in jedem Format, die übermittelt, gespeichert, von Ihnen mit den Diensten gepostet, angezeigt, übertragen oder anderweitig genutzt werden.</p><ul><li data-list-item-id="e4b9e93c6f1745fd20d58c587e4928039">Sie behalten das <strong>Eigentum</strong> an allen Rechten, Titeln und Interessen an und für alle Ihre Inhalte.</li><li data-list-item-id="e6179adf092464aca669ab6b351813388">Sie erteilen uns die Erlaubnis, Ihre Website zu hosten, und gewähren uns das Recht, Ihre Inhalte <strong>ausschließlich zum Zweck der Bereitstellung von Diensten</strong> aufzubewahren, zu nutzen und offenzulegen.</li><li data-list-item-id="e13931f76cb995e47509bcf033a3d8da9">Diese Berechtigung besteht nur <strong>für solange Sie die Dienste weiterhin nutzen</strong>.</li></ul><h2>Unbefugter Zugriff auf Ihre Inhalte oder Nutzung der Dienste</h2><p>Wir haften Ihnen oder Dritten gegenüber <strong>nicht</strong> für den unbefugten Zugriff auf Ihre Inhalte oder deren unbefugte Nutzung der Dienste.Sie sind <strong>verantwortlich</strong> für die Nutzung der Dienste durch jeden Ihrer Mitarbeiter und alle von Ihnen autorisierten Personen, die die Dienste nutzen, jede Person, der Sie Zugriff auf die Dienste gewährt haben, und jede Person, die Zugriff auf Ihren Inhalt oder die Dienste aufgrund Ihres Versäumnisses, angemessene Sicherheitsvorkehrungen zu treffen, erhält, selbst wenn dies nicht von Ihnen autorisiert wäre.</p><h2>Urheberrechtsgesetz</h2><p>Wir achten die <strong>geistigen Eigentumsrechte</strong> anderer und erwarten dasselbe von Ihnen. Wir werden auf Benachrichtigungen bezüglich Urheberrechtsverletzungen gemäß dem "Gesetz über Urheberrecht und verwandte Schutzrechte" (<strong>Urheberrechtsgesetz – UrhG</strong>) reagieren. Unsere Reaktion darauf kann das Entfernen oder Sperren des Zugriffs auf mutmaßlich rechtsverletzende Inhalte sowie die Sperrung Ihres Zugriffs auf unsere Dienste beinhalten, wenn wir keine zufriedenstellende Antwort von Ihnen erhalten, nachdem eine Verstoßmitteilung eingegangen ist.</p><h3>Mitteilung über Urheberrechtsverletzung</h3><p>Wenn Sie der Ansicht sind, dass Inhalte in unseren Diensten das Urheberrecht verletzen, sind Sie (die <strong>"meldende Partei"</strong>) aufgefordert, eine Mitteilung über eine Urheberrechtsverletzung an den benannten Vertreter zu senden mit:</p><ul><li data-list-item-id="e58689f99e1f2598042f4cee6d0182831"><strong>(a)</strong> Beschreibung des urheberrechtlich geschützten Werks oder Materials, von dem die meldende Partei behauptet, dass es verletzt wird;</li><li data-list-item-id="eaff886a1ee2bebc18a1dadb244b769b5"><strong>(b)</strong> die URL, unter der sich das Material, das angeblich verletzt wird, in unseren Diensten befindet, oder eine ausreichend detaillierte Beschreibung des Standorts, damit wir es identifizieren können;</li><li data-list-item-id="e324deeb1e5d1fbaa2b458c9d18944d50"><strong>(c)</strong> Kontaktdaten der meldenden Partei, einschließlich Adresse, Telefonnummer und E-Mail-Adresse;</li><li data-list-item-id="e96c2153fc7757f556c819b11e1d40b2f"><strong>(d)</strong> eine schriftliche Erklärung der meldenden Partei in gutem Glauben, dass die umstrittene Nutzung nicht vom Urheberrechtsinhaber, seinem Vertreter oder dem Gesetz genehmigt wurde;</li><li data-list-item-id="e43dbc15b88362a94711cb71d49b26207"><strong>(e)</strong> eine eidesstattliche Erklärung der meldenden Partei, dass die in der Mitteilung gemachten Angaben korrekt sind und dass die meldende Partei entweder der Urheberrechtsinhaber ist oder befugt ist, die Beschwerde im Namen des Urheberrechtsinhabers einzureichen; und</li><li data-list-item-id="eb571e000278da859fd3c7d713e168a5f"><strong>(f)</strong> eine elektronische oder physische Unterschrift der meldenden Partei.</li></ul><p>Der vom SODa benannte <strong>Urheberrechtsbeauftragte</strong> für den Empfang von Benachrichtigungen über behauptete Rechtsverletzungen kann wie folgt erreicht werden: E-Mail an den Vorstand des SODa.<strong>Bitte beachten Sie:</strong> Ihre Mitteilung möglicherweise ungültig ist, wenn Sie nicht alle Anforderungen dieses Abschnitts erfüllen. Es kann möglicherweise nicht auf Entfernungsanfragen reagiert werden. Beachten Sie auch die <strong>Datenschutz-Grundverordnung (DSGVO)</strong>: https://dsgvo-gesetz.de/</p><h2>Beendigung</h2><ul><li data-list-item-id="e0f16a258ce6d2b8f12acc32d8e75481d">Wir können diese Vereinbarung <strong>jederzeit</strong> nach unserem alleinigen Ermessen <strong>kündigen</strong>.</li><li data-list-item-id="e69794a893a6895ab6fe34ca31511814b">Wir werden Sie im Voraus schriftlich darüber informieren, indem wir entweder eine Mitteilung auf unserer Website veröffentlichen oder Sie direkt kontaktieren.</li><li data-list-item-id="e5493317a0c8aed61d1103747e70b3936">Nach einer solchen Kündigung haben Sie <strong>keinen Zugriff mehr</strong> auf die Dienste und <strong>SODa Semantic Co-Working Space wird alle Inhalte löschen</strong>, die sich in der Umgebung der Dienste befinden.</li></ul><h2>Vertrauliche Informationen</h2><ul><li data-list-item-id="e21f8eed91c2be9e0e35372bd32eda6e8">Jeder von uns verpflichtet sich, die <strong>vertraulichen Informationen</strong> des anderen <strong>nicht zu verwenden</strong>, es sei denn, dies ist gesetzlich vorgeschrieben oder als Reaktion auf eine Vorladung oder anderes rechtliches Verfahren.</li><li data-list-item-id="e95c93236cbf0385cdc592f9655b61982">Vorausgesetzt, dass jeder von uns zustimmt, den anderen <strong>sieben (7) Tage im Voraus</strong> zu benachrichtigen (sofern gesetzlich zulässig), bevor vertrauliche Informationen offengelegt werden.</li><li data-list-item-id="eb4fdfdc25179157b3bdea0353f1978c9">Wir können Ihre <strong>Registrierungsinformationen</strong> verwenden, um Sie zu <strong>Marketingzwecken</strong> zu kontaktieren.</li></ul><h2>Schadensersatz</h2><p>Sie erklären sich damit einverstanden, <strong>uns und dem SODa</strong>, seinem Vorstand, Vertretern, Mitgliedern, Partnern, Mitarbeitern usw. von jeglichen Ansprüchen oder Forderungen Dritter <strong>zu entschädigen und freizustellen</strong> (einschließlich angemessener Anwaltskosten und etwaiger Schadensersatzansprüche, Bußgelder oder anderer uns auferlegter Beträge), die aufgrund oder im Zusammenhang mit Ihren Inhalten oder einer unangemessenen Nutzung der Dienste, Verletzung dieser Bedingungen, Ihrer groben Fahrlässigkeit oder Ihrem vorsätzlichen Fehlverhalten oder Gesetzesverstoß oder Verstoß jeglicher Rechte eines anderen erhoben werden.Zu Ihren Pflichten gemäß diesem Unterabschnitt gehören Ansprüche, die sich aus den Handlungen oder Unterlassungen Ihrer Mitarbeiter und Vertreter, jeder anderen Person, der Sie Zugang zu den Diensten gewährt haben, und jeder anderen Person, die Zugriff auf die Dienste erhält, weil Sie es versäumt haben, angemessene Sicherheitsvorkehrungen zu treffen, ergeben, selbst wenn die Handlungen oder Unterlassungen dieser Personen nicht von Ihnen genehmigt wurden.<strong>Wenn Sie die Dienste weiterverkaufen</strong>, gilt der Grund für die Entschädigung. Die oben genannten Ansprüche umfassen auch <strong>alle Ansprüche Ihrer Kunden oder Endbenutzer</strong>, die sich aus Ihrem Weiterverkauf der Dienstleistungen ergeben.</p><ul><li data-list-item-id="ee0ac3ebf231131f48af61eabcd332833">Wir werden einen <strong>Rechtsbeistand</strong> zur Verteidigung des Anspruchs beauftragen, vorausgesetzt, dass diese Entscheidungen angemessen sind und Ihnen umgehend mitgeteilt werden müssen.</li><li data-list-item-id="ec6dcc3c2784d2513719650374fc8df0d">Sie müssen unseren <strong>angemessenen Bitten</strong> um Unterstützung und Zusammenarbeit bei der Verteidigung des Anspruchs nachkommen.</li><li data-list-item-id="e2918f768fab3296b952a77a963754b8a">Sie müssen die <strong>gemäß diesem Abschnitt fälligen Kosten</strong> bezahlen, sobald sie uns entstehen.</li></ul><h2>Haftungsbeschränkung</h2><ul><li data-list-item-id="ecd187fc250de8f1dc0d9daaaabba3850">Wir haften Ihnen gegenüber <strong>nicht</strong> für besondere, indirekte, zufällige, folgenreiche, strafende, vorbildliche oder ähnliche Schäden, einschließlich, aber nicht beschränkt auf entgangene Einnahmen oder Gewinne, die sich in irgendeiner Weise aus diesen Bedingungen ergeben oder damit in Zusammenhang stehen, <strong>auch wenn</strong> wir auf die Möglichkeit solcher Schäden hingewiesen wurden.</li><li data-list-item-id="e2a84afe5e12cfa04da68c0fd08610f73">Wir haften Ihnen gegenüber <strong>nicht für verlorene Inhalte</strong>.</li></ul><h2>Untersagte Gruppen, Export</h2><p>Sie versichern und gewährleisten, dass Sie <strong>nicht</strong> in der Bundeswehr, anderen explizit sicherheitsbezogenen oder sensiblen gesellschaftlichen, wirtschaftlichen oder politischen Unternehmen oder Organisationen tätig sind (kritische Infrastruktur, Staatsfinanzen, entsprechende Bereiche der Politik, gesichert links- oder rechtsextreme bzw. verbotene oder vom Verfassungsschutz überwachte Vereinigungen).Sie erklären sich damit einverstanden, <strong>alle geltenden Gesetze</strong> in Bezug auf die Übermittlung technischer Daten, die aus Deutschland oder dem Land, in dem Sie wohnen, exportiert werden, einzuhalten. Sie erkennen an, dass die Dienste möglicherweise den <strong>deutschen Exportkontroll- und Sanktionsgesetzen</strong> (einschließlich der Verwaltungsvorschriften zu den Exportgesetzen – "Exportkontrollen") unterliegen und dass Sie <strong>alle geltenden Exportkontrollen</strong> einhalten.</p><h2>Definitionen</h2><h3>„Vertrauliche Informationen“</h3><p>Alle Informationen, die einer der Vertragspartner dem anderen gegenüber offenlegt, sei es vor oder nach der Annahme dieser Bedingungen, die der Empfänger vernünftigerweise als vertraulich betrachten sollte, einschließlich:</p><ul><li data-list-item-id="ece077407452ef6ac0b5675e4d96294ed"><strong>(i)</strong> für Sie: alle Informationen, die an oder von den Diensten übermittelt oder darin gespeichert werden;</li><li data-list-item-id="eee40a435652715e2a854fd972b00f39b"><strong>(ii)</strong> für den SODa: unveröffentlichte Preise und andere Nutzungsbedingungen, Audit- und Sicherheitsberichte, Produktentwicklungspläne und andere geschützte Informationen oder Technologie; und</li><li data-list-item-id="e1b0ed8337dc6147b8f13c9ea4911859b"><strong>(iii)</strong> für beide Vertragspartner: Informationen, die als vertraulich gekennzeichnet oder anderweitig auffällig gekennzeichnet sind.</li></ul><p>Dazu zählen <strong>nicht</strong> Informationen, die von einem Vertragspartner unabhängig generiert wurden, ohne einen Bezug auf die Vertraulichkeit des anderen, oder Informationen, die von einem Vertragspartner durch eine Verletzung einer Vereinbarung oder eines Gesetzes entstanden sind – diese stellen keine „vertraulichen Informationen“ der anderen Partei dar.</p><h3>„PII“</h3><ul><li data-list-item-id="eefe39e039553915a7f4374545345b8d2"><strong>(i)</strong> eine Kombination beliebiger Informationen, mit denen eine Person anhand von sensiblen und nicht öffentlichen Finanz-, Gesundheits- oder anderen Daten identifiziert werden kann; oder ein Attribut, beispielsweise eine Kombination aus dem Namen, der Adresse oder der Telefonnummer der Person mit den sozialen Netzwerken der Person, Identifikationsnummer oder eine andere von der Regierung ausgestellte Nummer, Finanzkontonummer, Geburtsdatum, Adresse, biometrische Daten, der Mädchenname der Mutter oder andere persönlich identifizierbare Informationen; bzw.</li><li data-list-item-id="ef1e3d69ce2d1e4735b4fbae4a3b09fb0"><strong>(ii)</strong> "<strong>personenbezogene Daten</strong>" wie in <strong>Art. 4 der DSGVO</strong> definiert.</li></ul><h2>Allgemeines</h2><h3>Abtretung</h3><p>Sie dürfen diese Bedingungen <strong>nicht</strong> an eine andere Partei <strong>abtreten</strong>.</p><h3>Anwendbares Recht</h3><p>Diese Bedingungen unterliegen den <strong>Gesetzen des Commonwealth of Massachusetts</strong> ohne Rücksicht auf seine Kollisionsrechtsbestimmungen.</p><h3>Streitbeilegung</h3><ul><li data-list-item-id="ea407c2062a2958af30bcee2c3d38053e">Im Falle von <strong>Streitigkeiten oder Ansprüchen</strong>, die sich aus dieser Vereinbarung ergeben: Kann diese Vereinbarung <strong>nicht innerhalb von dreißig (30) Tagen</strong> gelöst werden, kann jede Partei innerhalb eines Tages einen <strong>schriftlichen Antrag auf Mediation</strong> stellen.</li><li data-list-item-id="e04cc6e154081fa78ade7d840eac7e273">Wenn der Streit <strong>nicht durch Mediation</strong> gelöst werden kann, wird der Streit durch ein <strong>verbindliches Schiedsverfahren</strong> beigelegt werden.</li><li data-list-item-id="e8e1af54bebb86f8df3207bed6c9e623f">Der oder die Schiedsrichter<em>in wird gemäß den Bestimmungen eines vereinbarten Schiedsverfahrens ausgewählt.</em></li><li data-list-item-id="ec06eb1684e773f41fe0a748195966bdf">Der oder die Schiedsrichter<em>in darf <strong>keine nichtmonetäre oder billigkeitsrechtliche Entschädigung</strong> jeglicher Art gewähren.</em></li><li data-list-item-id="e94220d027d482a80e85ca9a0fb13319f"><strong>Alle Aspekte</strong> des Schiedsverfahrens werden <strong>vertraulich</strong> behandelt und von keiner der Parteien offengelegt, es sei denn, dies ist zur Einhaltung gesetzlicher oder behördlicher Anforderungen erforderlich.</li><li data-list-item-id="ee1647efc6b1dd047c9389284f49108b7">Das Urteil über den <strong>Schiedsspruch</strong> kann durch jedes zuständige ordentliche Gericht vollstreckt werden.</li></ul><h3>Kosten</h3><ul><li data-list-item-id="e8c045b11b5cd25a5b0bf22c72e0977d0"><strong>Jede Partei</strong> trägt ihre <strong>eigenen Kosten</strong> des Schiedsverfahrens.</li><li data-list-item-id="ea47b2a9d34a63197c8baf9647ef46104">Die <strong>Honorare und Auslagen</strong> des Mediators und des Schiedsrichters werden <strong>zu gleichen Teilen</strong> getragen.</li></ul><h3>Salvatorische Klausel</h3><ul><li data-list-item-id="ef6af56be8b14145b33c1fec872fc628e">Sollte sich herausstellen, dass ein Teil dieser Bedingungen <strong>ungültig oder nicht durchsetzbar</strong> ist, wird dieser Teil soweit gesetzlich zulässig durchgesetzt, und der <strong>Rest</strong> dieser Bedingungen bleibt in vollem Umfang in Kraft.</li><li data-list-item-id="eb800bb38b33a1aa0ff8f76c5cc9d0ce6">Sollte sich herausstellen, dass ein Teil dieser Bedingungen von einem Gericht <strong>nicht durchsetzbar</strong> ist, bleibt der Rest dieser Bedingungen dennoch in Wirkung, und der nicht durchsetzbare Teil wird <strong>so weit wie möglich umgestaltet</strong>, um ihn durchsetzbar, aber dennoch konsistent mit den geschäftlichen und finanziellen Zielen der Parteien zu machen, die diesen Bedingungen zugrunde liegen.</li></ul><h3>Beziehung der Parteien</h3><ul><li data-list-item-id="e8cf8b3815a99bcd597f1064da8ee8d3b"><strong>Nichts</strong> in diesen Bedingungen gilt als Gründung einer Agentur, Partnerschaft oder einer anderen Form eines gemeinsamen Unternehmens zwischen den Parteien.</li><li data-list-item-id="e088e1ba1bf4ac352ab399e72a991fe03">Die Beziehung zwischen uns ist die eines <strong>unabhängigen Auftragnehmers</strong> und nicht eines Geschäftspartners.</li><li data-list-item-id="e130685ddf200ebc73acdd44d3265e02d"><strong>Weder</strong> einer von uns ist der Vertreter des anderen, <strong>noch</strong> hat einer von uns das Recht, den anderen im Rahmen einer Vereinbarung mit einem Dritten zu binden.</li></ul><h3>Verjährung</h3><p>Sie erklären sich damit einverstanden, dass unabhängig von gegenteiligen Gesetzen alle Ansprüche oder Klagegründe, die sich aus oder im Zusammenhang mit der Nutzung unserer Dienste oder dieser Bedingungen ergeben, <strong>innerhalb eines (1) Jahres</strong> nach Entstehung eines solchen Anspruchs oder Klagegrundes eingereicht werden müssen oder <strong>für immer ausgeschlossen</strong> sind.</p><h3>Sammelklagen</h3><p>Die Ansprüche mehrerer Personen können <strong>in keinem Fall</strong> in irgendeiner Form durch ein <strong>Sammel- oder Vertretungsverfahren</strong> oder ähnliches zusammengelegt werden.</p><h3>Durchsetzung und Verzicht</h3><p>Jeder von uns kann <strong>seine jeweiligen Rechte</strong> aus diesen Bedingungen <strong>durchsetzen</strong>, auch dann, wenn wir auf dieses Recht verzichtet haben oder es versäumt haben, dasselbe oder andere Rechte in der Vergangenheit durchzusetzen.</p><h3>Vollständige Vereinbarung</h3><p>Diese Bedingungen stellen die <strong>einzige Vereinbarung</strong> zwischen Ihnen und <strong>SODa</strong> bezüglich SODa Semantic Co-Working Space dar.<strong>Nürnberg, 2026</strong></p>'
