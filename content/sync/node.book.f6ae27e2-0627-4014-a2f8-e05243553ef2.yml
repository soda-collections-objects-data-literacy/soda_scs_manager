  body:
    value: '<h2>SODa SCS Components</h2><p>Until this point we always talked about applications as the main entities. In the SCS backend we divide them into <em>Components </em>(individual infrastructure services such as databases, storage systems, and single applications) and <em>Stacks </em>(complete environments with several included Components). The Components administration area allows you to manage all deployed Components across the entire platform.</p><h3>What You Can Do</h3><ul><li>View all Components deployed by any user in the system</li><li>Edit Component configurations and settings</li><li>Monitor Component health and performance across the platform</li><li>Delete or deactivate Components that are no longer needed</li><li>Transfer Component ownership between users</li><li>View Component usage statistics and resource consumption</li></ul><p><span style="color:#c44569;"><em><strong>Some of these tasks require administrator privileges, so you may not be able to access or perform these tasks.</strong></em></span></p><h3>Managing Components</h3><p>To manage Components:</p><ol><li>Navigate to <strong>Administration → SODa SCS Components</strong></li><li>Browse the list of all deployed Components</li><li>Use filters to find specific Components by type, owner, or status</li><li>Click on a Component to view detailed information and configuration options</li><li>Use the action buttons to view, edit, or delete Components</li></ol><h3>Component Types</h3><ul><li><strong>SQL Components</strong>: Relational databases (MySQL, PostgreSQL, etc.)</li><li><strong>Triplestore Components</strong>: Semantic databases for linked data</li><li><strong>Filesystem Components</strong>: File storage systems</li><li><strong>Single Applications</strong>: Standalone tools like WebProtégé</li></ul>'
    summary: ''
