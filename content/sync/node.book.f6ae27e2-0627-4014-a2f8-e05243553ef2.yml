    body:
      value: '<h2>SODa SCS Komponenten</h2><p>Bis zu diesem Punkt haben wir immer von Anwendungen als Hauptentitäten gesprochen. Im SCS-Backend unterteilen wir sie in Komponenten (einzelne Infrastrukturdienste wie Datenbanken, Speichersysteme und Einzelanwendungen..) und Stacks (vollständige Umgebungen mit mehreren enthaltenen Komponenten). Der Komponentenverwaltungsbereich ermöglicht es Ihnen, alle bereitgestellten Komponenten auf der gesamten Plattform zu verwalten.</p><h3>Was Sie tun können</h3><ul><li>Alle von beliebigen Benutzern im System bereitgestellten Komponenten anzeigen</li><li>Komponentenkonfigurationen und -einstellungen bearbeiten</li><li>Komponentenzustand und -leistung plattformübergreifend überwachen</li><li>Komponenten löschen oder deaktivieren, die nicht mehr benötigt werden</li><li>Komponenteneigentümerschaft zwischen Benutzern übertragen</li><li>Komponentennutzungsstatistiken und Ressourcenverbrauch anzeigen</li></ul><p><span style="color:#ff6b6b;"><em><strong>Einige dieser Aufgaben erfordern Administratorrechte, sodass Sie möglicherweise nicht auf diese Aufgaben zugreifen oder sie ausführen können.</strong></em></span></p><h3>Verwalten von Komponenten</h3><p>So verwalten Sie Komponenten:</p><ol><li>Navigieren Sie zu <strong>Administration → SODa SCS Komponenten</strong></li><li>Durchsuchen Sie die Liste aller bereitgestellten Komponenten</li><li>Verwenden Sie Filter, um bestimmte Komponenten nach Typ, Eigentümer oder Status zu finden</li><li>Klicken Sie auf eine Komponente, um detaillierte Informationen und Konfigurationsoptionen anzuzeigen</li><li>Verwenden Sie die Aktionsschaltflächen, um Komponenten anzuzeigen, zu bearbeiten oder zu löschen</li></ol><h3>Komponententypen</h3><ul><li><strong>SQL-Komponenten</strong>: Relationale Datenbanken (MySQL, PostgreSQL usw.)</li><li><strong>Triplestore-Komponenten</strong>: Semantische Datenbanken für Linked Data</li><li><strong>Dateisystem-Komponenten</strong>: Dateispeichersysteme</li><li><strong>Einzelanwendungen</strong>: Eigenständige Werkzeuge wie WebProtégé</li></ul>'
      summary: ''
      format: full_html
