  body:
    value: '<h2>Context</h2><p>The Dashboard is your central hub for managing all deployed applications in the SODa Semantic Co-Working Space. It provides a comprehensive overview of your research environments, databases, storage, and applications, organized by team members for easy collaboration and monitoring.</p><h2>Goals</h2><ul><li data-list-item-id="e223ca4ee916a25911b1d396b86bca105">Understand how to navigate and use the Dashboard effectively</li><li data-list-item-id="e1da74debd8fc81f91376250aa7f569ce">Learn how to monitor and manage your deployed applications</li><li data-list-item-id="ec8a8226e003257d17fbb4c39d71fe010">Develop the ability to access and configure running services</li></ul><h2>Prerequisites</h2><ul><li data-list-item-id="e13ebe6ecfff34ac88cfef68ad94a95ed">An active SODa SCS Manager account</li></ul><h2>Understanding the Dashboard</h2><h3>Dashboard Layout</h3><p>The Dashboard displays all applications you have access to by displaying cards for individual applications. Each card provides essential information at a glance:</p><ul><li data-list-item-id="eb9e9c2f93a4daee33b6830e4d7dcf25c"><strong>Application Name</strong>: The name you assigned during deployment</li><li data-list-item-id="e2be393420b5266431ea59317d934ae60"><strong>Application Type</strong>: Research Environment, Database, Storage, or Single Application</li><li data-list-item-id="e6a46a7bb9a994c64a2ad2c828861d1d1"><strong>Description</strong>: Your notes about the application''s purpose</li><li data-list-item-id="e1cd04250a0ca03efe20d2b6e35cd26a5"><strong>Tags</strong>: Category tags for filtering and organization</li></ul><h3>Filtering Applications</h3><p>Use the tag filters at the top of the Dashboard to quickly find specific types of applications. Click on tags to filter by the application type or purpose.</p><h3>Application cards</h3><p>At the top left of any application card you can see the <strong>health status</strong> of the application displayed.</p><p>Clicking on an application card will <strong>open the Application</strong>.</p><p>The looking glass at the top of the card can take you to the <a href="/node/41"><strong>detail view</strong></a> of the application. From there you can:</p><ul><li data-list-item-id="e8386392184bc92cca36a71b498a4acb6">View complete configuration details</li><li data-list-item-id="e926ffbf5d12b0c7ac003b55637be3a77">Access connection information (URLs, credentials, endpoints)</li><li data-list-item-id="e1f0934cde0ae62b52e22c1dde3567281">Monitor health status and performance metrics</li></ul>'
