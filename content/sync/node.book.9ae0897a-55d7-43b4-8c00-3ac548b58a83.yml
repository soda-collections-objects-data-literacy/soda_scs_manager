    body:
      value: '<h2>Kontext</h2><p>Das Dashboard ist Ihre zentrale Übersicht zur Verwaltung aller bereitgestellten Anwendungen im SODa Semantic Co-Working Space. Es bietet einen umfassenden Überblick über Ihre Forschungsumgebungen, Datenbanken, Speicher und Anwendungen und organisiert diese nach Teammitgliedern, um Zusammenarbeit und Monitoring zu erleichtern.</p><h2>Ziele</h2><ul><li data-list-item-id="e223ca4ee916a25911b1d396b86bca105">Verstehen, wie man das Dashboard effektiv navigiert und nutzt</li><li data-list-item-id="e1da74debd8fc81f91376250aa7f569ce">Lernen, wie bereitgestellte Anwendungen überwacht und verwaltet werden</li><li data-list-item-id="ec8a8226e003257d17fbb4c39d71fe010">Die Fähigkeit entwickeln, auf laufende Dienste zuzugreifen und diese zu konfigurieren</li></ul><h2>Voraussetzungen</h2><ul><li data-list-item-id="e13ebe6ecfff34ac88cfef68ad94a95ed">Ein aktives SODa SCS Manager-Konto</li></ul><h2>Das Dashboard verstehen</h2><h3>Aufbau des Dashboards</h3><p>Das Dashboard zeigt alle Anwendungen an, auf die Sie Zugriff haben. Diese werden als Karten für einzelne Anwendungen dargestellt. Jede Karte zeigt auf einen Blick wichtige Informationen:</p><ul><li data-list-item-id="eb9e9c2f93a4daee33b6830e4d7dcf25c"><strong>Name der Anwendung</strong>: Der Name, den Sie bei der Bereitstellung vergeben haben</li><li data-list-item-id="e2be393420b5266431ea59317d934ae60"><strong>Anwendungstyp</strong>: Forschungsumgebung, Datenbank, Speicher oder Einzelanwendung</li><li data-list-item-id="e6a46a7bb9a994c64a2ad2c828861d1d1"><strong>Beschreibung</strong>: Ihre Notizen zum Zweck der Anwendung</li><li data-list-item-id="e1cd04250a0ca03efe20d2b6e35cd26a5"><strong>Tags</strong>: Kategorien zur Filterung und Organisation</li></ul><h3>Anwendungen filtern</h3><p>Verwenden Sie die Tag-Filter am oberen Rand des Dashboards, um schnell bestimmte Anwendungstypen zu finden. Klicken Sie auf Tags, um nach Anwendungstyp oder Zweck zu filtern.</p><h3>Anwendungskarten</h3><p>Oben links auf jeder Anwendungskarte wird der <strong>Health Status</strong> der Anwendung angezeigt.</p><p>Wenn Sie auf eine Anwendungskarte klicken, wird die <strong>Anwendung geöffnet</strong>.</p><p>Das Lupensymbol oben auf der Karte führt Sie zur <a href="/node/41"><strong>Detailansicht</strong></a> der Anwendung. Dort können Sie:</p><ul><li data-list-item-id="e8386392184bc92cca36a71b498a4acb6">vollständige Konfigurationsdetails anzeigen</li><li data-list-item-id="e926ffbf5d12b0c7ac003b55637be3a77">Verbindungsinformationen abrufen (URLs, Zugangsdaten, Endpunkte)</li><li data-list-item-id="e1f0934cde0ae62b52e22c1dde3567281">Status und Leistungsmetriken überwachen</li></ul>'
      summary: ''
      format: basic_html
