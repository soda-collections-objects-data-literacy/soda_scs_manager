    field__app__description:
      value: '<h2>Übersicht</h2><p>MariaDB ist ein Open-Source-Datenbankverwaltungssystem für relationale Datenbanken, das neben dem OpenGDB-Triplestore als eine der primären Datenspeicher-Engines für strukturierte Daten dient. MariaDB ist ein vollständig kompatibler Ersatz für MySQL und bietet hohe Leistung, Sicherheit und Skalierbarkeit für die Speicherung von Anwendungsdaten, Benutzerinformationen und Systemkonfigurationen.</p><h2>Möglichkeiten</h2><p>MariaDB-Datenbanken werden als einzelne Anwendungen erstellt und verwaltet und können über die Datenbankverwaltungssoftware PhpMyAdmin verwaltet werden. Dies ist der Ort, um Ihre Daten zu importieren, zu exportieren und abzufragen.</p><p>&nbsp;</p>'
