    body:
      value: '<h2>Kontext</h2><p>Der Administrationsbereich bietet umfassende Verwaltungswerkzeuge für alle Aspekte des SODa Semantic Co-Working Space. Dieser Abschnitt ist für Administratoren und fortgeschrittene Benutzer konzipiert, die Anwendungen, Projekte, Sicherheit und Systemressourcen auf der gesamten Plattform überwachen müssen.</p><h2>Ziele</h2><ul><li>Verstehen Sie die verschiedenen Administrationsbereiche und ihre Zwecke</li><li>Lernen Sie, wie Sie Anwendungen, Projekte und Ressourcen effektiv verwalten</li><li>Gewinnen Sie Kenntnisse über Sicherheitsverwaltung durch Service-Keys</li><li>Entwickeln Sie die Fähigkeit, erweiterte administrative Aufgaben durchzuführen</li></ul><h2>Voraussetzungen</h2><ul><li>Vertrautheit mit dem <a href="/app/dashboard">Dashboard</a> und dem <a href="/app/catalogue">Katalog</a></li><li>Verständnis der Infrastrukturbedürfnisse Ihrer Organisation</li></ul><h2>Administrationsübersicht</h2><p>Der Administrationsbereich ist in fünf Hauptbereiche unterteilt, die jeweils spezialisierte Verwaltungsfunktionen für verschiedene Aspekte des SODa SCS Manager bieten:</p><ul><li><a href="/node/32" data-entity-type="node" data-entity-uuid="f6ae27e2-0627-4014-a2f8-e05243553ef2" data-entity-substitution="canonical">Komponenten</a></li><li><a href="/node/20" data-entity-type="node" data-entity-uuid="d520c9f7-8620-4b64-8bb9-3af5b158f98f" data-entity-substitution="canonical">Projekte</a></li><li><a href="/node/33" data-entity-type="node" data-entity-uuid="280a41c7-2f3e-4eb2-9138-74a144d515bd" data-entity-substitution="canonical">Service-Keys</a></li><li><a href="/node/34" data-entity-type="node" data-entity-uuid="4f1dfad5-26ad-4fb7-9da5-82689597bc16" data-entity-substitution="canonical">Snapshots</a></li><li><a href="/node/35" data-entity-type="node" data-entity-uuid="1822ec6a-c731-44af-8678-b0b77e4f93a8" data-entity-substitution="canonical">Stacks</a></li></ul><h2>Zusätzliche Ressourcen</h2><ul><li><a href="/app/dashboard">Dashboard-Leitfaden</a> - Die Benutzerperspektive verstehen</li><li><a href="/app/catalogue">Katalog-Leitfaden</a> - Erfahren Sie mehr über verfügbare Anwendungen und Stacks</li><li><a href="#">Sicherheits-Best-Practices</a> - Umfassende Sicherheitsrichtlinien</li><li><a href="#">Backup- und Wiederherstellungsleitfaden</a> - Detaillierte Snapshot-Verwaltungsverfahren</li><li><a href="#">Benutzerverwaltungsreferenz</a> - Verwaltung von Berechtigungen und Rollen</li></ul>'
