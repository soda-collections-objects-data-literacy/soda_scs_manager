    field__app__description:
      value: '<h2>Überblick</h2><p>WebProtégé ist eine freie, quelloffene, webbasierte Plattform für die gemeinsame Ontologieentwicklung. Nutzerinnen und Nutzer können OWL-2-Ontologien direkt im Webbrowser erstellen, bearbeiten und teilen. Es sind keine lokalen Installationen nötig; die Plattform bietet umfassende Werkzeuge für Wissensmodellierung und kollaboratives Ontologie-Engineering.</p><h2>Möglichkeiten</h2><p>WebProtégé unterstützt kollaborative Ontologieentwicklung: mehrere Personen arbeiten gleichzeitig an OWL-2-Ontologien über eine gemeinsame Weboberfläche. Die Plattform begleitet den gesamten Lebenszyklus – von ersten Konzeptmodellen bis zu anspruchsvoller Wissensrepräsentation – mit Echtzeit-Kollaboration, Änderungsnachverfolgung und koordinierter Einbindung verteilter Teams.</p><p>Das System bietet umfassende Bearbeitungsfunktionen für Klassen, Eigenschaften und Individuen sowie komplexe Beziehungen und Constraints. Fachexpertinnen und -experten können über anpassbare Webformulare beitragen, sodass Ontologieentwicklung auch ohne tiefe Kenntnis formaler Logik oder OWL-Syntax zugänglich bleibt.</p><p>Zusammenarbeit wird durch Diskussionsthreads, detailliertes Änderungs-Tracking und eine Revisionshistorie unterstützt, die die Entwicklung der Ontologie nachvollziehbar macht. Kommentare zu Elementen, Änderungsvorschläge und strukturierte Diskussionen sind direkt in der Plattform möglich.</p><p>Unterstützt werden mehrere Ontologieformate (RDF/XML, Turtle, OWL/XML, OBO) für interoperable Workflows. Import und Export erleichtern die Anbindung an Desktop-Editoren und andere Semantic-Web-Werkzeuge bei formatkonformer Weiterverarbeitung.</p>'
