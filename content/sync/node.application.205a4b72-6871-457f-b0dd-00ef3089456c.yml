    field__app__description:
      value: '<h2>Übersicht</h2><p>WebProtégé ist eine kostenlose, quelloffene, webbasierte Plattform für die kollaborative Ontologieentwicklung, die es Benutzern ermöglicht, OWL-2-Ontologien direkt über einen Webbrowser zu erstellen, zu bearbeiten und zu teilen. Die Plattform macht lokale Softwareinstallationen überflüssig und bietet gleichzeitig umfassende Werkzeuge für die Wissensmodellierung und das kollaborative Ontologie-Engineering.</p><h2>Möglichkeiten</h2><p>WebProtégé ermöglicht die kollaborative Ontologieentwicklung, bei der mehrere Benutzer über eine gemeinsame Weboberfläche gleichzeitig an OWL-2-Ontologien arbeiten können. Die Plattform unterstützt den gesamten Ontologie-Lebenszyklus – von der anfänglichen Konzeptmodellierung bis hin zur komplexen Wissensdarstellung – und bietet Tools für die Zusammenarbeit in Echtzeit, die Änderungen nachverfolgen und die Beiträge der Benutzer in verteilten Teams verwalten.<br>Das System bietet umfassende Funktionen zur Ontologiebearbeitung, mit denen Benutzer Klassen, Eigenschaften und Individuen erstellen und gleichzeitig komplexe Beziehungen und Einschränkungen definieren können. Fachexperten können über anpassbare Webformulare beitragen, die auf bestimmte Wissensdomänen zugeschnitten sind, wodurch die Ontologieentwicklung auch für Benutzer zugänglich wird, die keine tiefgreifenden technischen Kenntnisse in formaler Logik oder OWL-Syntax besitzen.<br>Die Zusammenarbeit wird durch integrierte Diskussionsstränge, detaillierte Änderungsverfolgung und einen Revisionsverlauf erleichtert, der einen vollständigen Prüfpfad der Ontologieentwicklung aufbewahrt. Benutzer können bestimmte Ontologieelemente kommentieren, Änderungen vorschlagen und direkt innerhalb der Plattform strukturierte Diskussionen über Modellierungsentscheidungen führen.<br>Die Plattform unterstützt mehrere Ontologieformate, darunter RDF/XML, Turtle, OWL/XML und OBO, und gewährleistet so die Interoperabilität mit bestehenden Tools und Arbeitsabläufen. Ihre Import-/Exportfunktionalität erleichtert die Integration mit Desktop-Ontologie-Editoren und anderen Semantic-Web-Tools und gewährleistet gleichzeitig die Formatkompatibilität zwischen verschiedenen Systemen.</p>'
