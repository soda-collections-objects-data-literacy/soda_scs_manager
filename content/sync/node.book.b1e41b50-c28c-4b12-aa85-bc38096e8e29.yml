    body:
      value: '<h2>Was sind Snapshots?</h2><p>Ein Snapshot erfasst den vollständigen Zustand einer Anwendung zu einem bestimmten Zeitpunkt, einschließlich:</p><ul><li data-list-item-id="e91807e557d1a20cd95b52e9dcb11f3ed"><strong>Anwendungsdaten</strong> – Alle Dateien, Datenbanken und Konfigurationen.</li><li data-list-item-id="e0c107865bd339b2610aa7b5845c7e05a"><strong>Systemzustand</strong> – Aktuelle Einstellungen und individuelle Anpassungen.</li><li data-list-item-id="e5fe22fbc469a4fac46ae84bf6d956914"><strong>Metadaten</strong> – Informationen darüber, wann und wie der Snapshot erstellt wurde.</li><li data-list-item-id="e8a5c90f94cc8881535c6fcdb6f977280"><strong>Integritätsprüfung</strong> – Prüfsummen zur Sicherstellung, dass die Daten nicht beschädigt wurden.</li></ul><h2>Snapshot-Typen nach Anwendung</h2><h3>Datenbank-Snapshots</h3><ul><li data-list-item-id="e192af1366018c2f6a13dd68703a0ab9d"><strong>SQL-Datenbanken</strong> – Vollständige Datenbank-Dumps mit allen Tabellen und Daten.</li><li data-list-item-id="efa09c5c3df9ce90856c25f218aa56494"><strong>Triplestores</strong> – Exporte von RDF-Daten im N-Quads-Format.</li></ul><h3>Dateisystem-Snapshots</h3><ul><li data-list-item-id="e293c5d4c8a9fd6b474e6533266d662c0"><strong>Gemeinsame Ordner</strong> – Derzeit nicht implementiert.</li><li data-list-item-id="ec4ba3df282b1acdf577f2584568209c6"><strong>WissKI-Daten</strong> – Drupal-Dateien, hochgeladene Inhalte und Konfigurationen.</li></ul><h3>Umgebungs-Snapshots</h3><ul><li data-list-item-id="e68b2c4e992f7ce6ceb62037b3f59df15"><strong>WissKI-Umgebungen</strong> – Alle Komponenten einer WissKI-Umgebung (Drupal-Root-Verzeichnis, Datenbank und Triplestore).</li><li data-list-item-id="e9e900b6b2f8c1c1965c4b85778143dec"><strong>Nextcloud</strong> – Nicht unterstützt.</li><li data-list-item-id="e3c7a0a5ff1569cd98fce8253f7a47d8c"><strong>JupyterHub</strong> – Nicht unterstützt.</li><li data-list-item-id="e51d3af843462efc1fbb65b10eab6e677"><strong>Webprotégé</strong> – Nicht unterstützt.</li></ul><h2>Wann Snapshots erstellt werden sollten</h2><h3>Vor größeren Änderungen</h3><p>Erstellen Sie immer einen Snapshot, bevor Sie:</p><ul><li data-list-item-id="e33d2c1dd9235b97794f25dc12eca4fad">Software oder Konfigurationen aktualisieren.</li><li data-list-item-id="e6d1a04a97a137b4fd0f80fa1eb59c947">Große Datenmengen importieren.</li><li data-list-item-id="ecb0a12f7c37570278fe61309a89d39fa">Strukturelle Änderungen am Datenmodell vornehmen.</li><li data-list-item-id="ed1bff1943392c9739bdd1208dbd38411">Mit neuen Funktionen experimentieren.</li><li data-list-item-id="e9897a219500b2e26badae6a1df8537c7">Vor Urlaub oder längeren Abwesenheiten.</li><li data-list-item-id="eb2171b0bca53d4949e4addc51da8e525">Zu wichtigen Projektmeilensteinen.</li></ul><h3>Datensicherung und Archivierung</h3><p>Erstellen Sie Snapshots für:</p><ul><li data-list-item-id="e4c769c8f12dd02f8b3c1f83523ebf389">Die Archivierung abgeschlossener Projekte.</li><li data-list-item-id="e40f9ec4ca31c751dbe587b18ae297eb1">Die Einhaltung institutioneller Anforderungen zur Datenaufbewahrung.</li><li data-list-item-id="edcff9f45652770ee45d39c9c36e7d96b">Das Teilen von Daten mit Projektbeteiligten.</li><li data-list-item-id="e4d0f5931d0a057d4caed969ebb86441f">Die Erstellung stabiler Versionen für Veröffentlichungen.</li></ul><h2>Erfahren Sie, wie Sie</h2><ul><li data-list-item-id="ecfceb423cb16993b6349e60929222cb9"><a href="/docs/snapshots/create">Einen Snapshot erstellen</a></li><li data-list-item-id="eecd872f1e881eb0c316719b1fe68e2a9"><a href="/docs/snapshots/restore">Aus einem Snapshot wiederherstellen</a></li><li data-list-item-id="e16e2c30b1372c7635128e522102c12b9"><a href="/docs/interface/admin/snapshots">Snapshots über die SCS-Administration verwalten</a></li></ul>'
