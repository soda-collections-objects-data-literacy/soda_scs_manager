  body:
    value: '<h3>Setting Up a New Research Team</h3><ol><li>Create a new project in <strong>SODa SCS Projects</strong></li><li>Add team members to the project</li><li>Deploy necessary Components or Stacks</li><li>Connect the applications to the project</li><li>Generate service keys if needed for integrations</li><li>Create initial snapshots for backup</li></ol><h3>Performing System Maintenance</h3><ol><li>Review all Components in <strong>SODa SCS Components</strong> for health issues</li><li>Create snapshots of critical applications before maintenance</li><li>Clean up unused service keys in <strong>SODa SCS Service Keys</strong></li><li>Delete old snapshots to free storage space</li><li>Archive or remove abandoned projects</li></ol><h3>Responding to Security Incidents</h3><ol><li>Immediately revoke compromised service keys</li><li>Review access logs for suspicious activity</li><li>Create snapshots of affected applications for forensics</li><li>Update project membership to remove unauthorized access</li><li>Generate new service keys with appropriate restrictions</li></ol><h2>Tips for Effective Administration</h2><ul><li><strong>Regular audits</strong>: Periodically review all areas to ensure proper configuration and security</li><li><strong>Documentation</strong>: Keep detailed notes about administrative decisions and changes</li><li><strong>Communication</strong>: Inform users before making changes that affect their applications</li><li><strong>Backup strategy</strong>: Maintain a consistent snapshot schedule for all critical applications</li><li><strong>Monitoring</strong>: Set up alerts for system issues and security events</li><li><strong>User support</strong>: Be available to help users with application issues and questions</li></ul>'
    summary: ''
    format: basic_html
