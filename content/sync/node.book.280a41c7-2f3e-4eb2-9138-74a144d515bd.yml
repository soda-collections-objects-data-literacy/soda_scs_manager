  body:
    value: '<h2>SODa SCS Service Keys</h2><p>Service Keys are authentication credentials that allow applications and external services to securely access SODa SCS resources. The Service Keys administration area manages all API keys, tokens, and credentials across the platform.</p><h3>What You Can Do</h3><ul><li>View all active service keys in the system</li><li>Generate new service keys for applications or integrations</li><li>Revoke compromised or unused service keys</li><li>Set expiration dates and access scopes for keys</li><li>Monitor service key usage and access patterns</li><li>Audit security events related to service keys</li></ul><h3>Managing Service Keys</h3><p>To manage service keys:</p><ol><li>Navigate to <strong>Administration → SODa SCS Service Keys</strong></li><li>Review the list of all service keys and their associated applications</li><li>Click "Add Service Key" to generate a new credential</li><li>Specify the key''s purpose, scope, and expiration</li><li>Copy the generated key securely (it will only be shown once)</li><li>Revoke keys immediately if they are compromised</li></ol><h3>Security Best Practices</h3><ul><li><strong>Use descriptive names</strong>: Clearly identify what each service key is used for</li><li><strong>Set expiration dates</strong>: Limit key lifetime to reduce security risks</li><li><strong>Rotate keys regularly</strong>: Update credentials on a schedule</li><li><strong>Revoke unused keys</strong>: Remove keys that are no longer needed</li><li><strong>Monitor usage</strong>: Watch for unusual access patterns</li><li><strong>Principle of least privilege</strong>: Grant only necessary permissions</li></ul>'
    summary: ''
    format: basic_html
