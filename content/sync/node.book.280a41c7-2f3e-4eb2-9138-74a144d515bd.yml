    body:
      value: '<h2>SODa SCS Service-Keys</h2><p>Service-Keys sind Authentifizierungsdaten, die es Anwendungen und externen Diensten ermöglichen, sicher auf SODa SCS-Ressourcen zuzugreifen. Der Service-Keys-Verwaltungsbereich verwaltet alle API-Schlüssel, Token und Anmeldedaten auf der Plattform.</p><h3>Was Sie tun können</h3><ul><li>Alle aktiven Service-Keys im System anzeigen</li><li>Neue Service-Keys für Anwendungen oder Integrationen generieren</li><li>Kompromittierte oder ungenutzte Service-Keys widerrufen</li><li>Ablaufdaten und Zugriffsbereiche für Schlüssel festlegen</li><li>Service-Key-Nutzung und Zugriffsmuster überwachen</li><li>Sicherheitsereignisse im Zusammenhang mit Service-Keys prüfen</li></ul><h3>Verwalten von Service-Keys</h3><p>So verwalten Sie Service-Keys:</p><ol><li>Navigieren Sie zu <strong>Administration → SODa SCS Service-Keys</strong></li><li>Überprüfen Sie die Liste aller Service-Keys und ihrer zugehörigen Anwendungen</li><li>Klicken Sie auf "Service-Key hinzufügen", um eine neue Berechtigung zu generieren</li><li>Geben Sie den Zweck, Umfang und Ablauf des Schlüssels an</li><li>Kopieren Sie den generierten Schlüssel sicher (er wird nur einmal angezeigt)</li><li>Widerrufen Sie Schlüssel sofort, wenn sie kompromittiert wurden</li></ol><h3>Sicherheits-Best-Practices</h3><ul><li><strong>Beschreibende Namen verwenden</strong>: Identifizieren Sie klar, wofür jeder Service-Key verwendet wird</li><li><strong>Ablaufdaten festlegen</strong>: Begrenzen Sie die Schlüssellebensdauer, um Sicherheitsrisiken zu reduzieren</li><li><strong>Schlüssel regelmäßig rotieren</strong>: Anmeldedaten nach einem Zeitplan aktualisieren</li><li><strong>Ungenutzte Schlüssel widerrufen</strong>: Schlüssel entfernen, die nicht mehr benötigt werden</li><li><strong>Nutzung überwachen</strong>: Auf ungewöhnliche Zugriffsmuster achten</li><li><strong>Prinzip der geringsten Rechte</strong>: Nur notwendige Berechtigungen gewähren</li></ul>'
      summary: ''
      format: basic_html
