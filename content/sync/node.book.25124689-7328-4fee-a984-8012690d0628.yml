    body:
      value: '<p>Wie Sie sehen, befinden Sie sich bereits auf den Seiten unserer Dokumentation. Hier finden Sie Hilfestellung und Hinweise zur Nutzung des SODa Semantic Co-Working Space. Durchsuchen Sie die verschiedenen Kapitel, um mehr über die <a href="/node/27" data-entity-type="node" data-entity-uuid="827f08af-7d09-40a8-bce5-1a9c36e03cf4" data-entity-substitution="canonical">ersten Schritte</a>, die <a href="/node/29" data-entity-type="node" data-entity-uuid="419acf14-58e3-4210-b710-04c298f88eb9" data-entity-substitution="canonical">Benutzeroberfläche</a>, <a href="/node/16" data-entity-type="node" data-entity-uuid="f5ec0346-0274-4099-8e3c-ae87b07d6e52" data-entity-substitution="canonical">verfügbare Anwendungen</a>, <a href="/node/20" data-entity-type="node" data-entity-uuid="d520c9f7-8620-4b64-8bb9-3af5b158f98f" data-entity-substitution="canonical">Projekte </a>und vieles mehr zu erfahren. Wenn Sie zusätzliche Unterstützung benötigen, wenden Sie sich bitte an Ihren <a href="mailto:scs-manager@sammlungen.io">Systemadministrator</a>.</p>'
