  body:
    value: '<p>As you can see, you are already in on the documentation pages. Here you can find comprehensive help and guidance for using the SODa Semantic Co-Working Space. Browse the sections to learn about <a href="/soda-scs-manager/documentation/getting-started">getting started</a>, the <a href="/soda-scs-manager/documentation/interface">interface</a>, <a href="/soda-scs-manager/documentation/apps">applications</a>, <a href="/soda-scs-manager/documentation/projects">projects</a>, and more.If you need additional support, please contact your <a href="mailto:scs-manager@sammlungen.io">system administrator</a>.</p>'
    summary: ''
    format: basic_html
