  body:
    value: '<h2>Context</h2><p>Your Applications can be accessed through the <a href="/node/40">Dashboard</a>. Opening the Page of each application allows you to use them as well as configure them.</p><h2>What you''ll learn</h2><ul><li data-list-item-id="eec15b2df001a09330b70055756d98f65">How to use/open applications</li><li data-list-item-id="efc81dbf4b880a556a02bec58dc772911">Ways you can interact with SCS applications</li></ul><h2>Prerequisites</h2><ul><li data-list-item-id="e09356b195ad98175ae69d29dfddc43a7">An active SCS user account</li><li data-list-item-id="ea8df9f24938fcaa4735f422f11f13f24">Knowing how to navigate the <a href="/node/40">Dashboard</a> or creating a new application</li><li data-list-item-id="ed9e374c4686429729c7d8999c7c7eb92">Understanding the difference between user specific applications and those that can be created through the "Add Application" button</li></ul><h2>The Application Page</h2><p>After creating an application or navigatiing here by clicking on the application card in the Dashboard you can get an overview of your application and its configuration as well as reconfiguring some of the settings. This done by clicking the different tabs displayed above the page (application) title:</p><ul><li class="ck-list-marker-bold" data-list-item-id="ea77146983f35cc60116d022f2703b6eb"><strong>View</strong></li><li class="ck-list-marker-bold" data-list-item-id="e729e3e61a156c0c131294109533df1f4"><strong>Edit*</strong></li><li data-list-item-id="ed6af18b0747597f0d30e779b2c321500"><strong>Show</strong>*</li><li data-list-item-id="eca41ad061ef57cd2a2f69cc659948963"><strong>Snapshot</strong>*</li><li class="ck-list-marker-bold" data-list-item-id="e3b469a7df0b103a28d5a114512bb0c41"><strong>Delete*</strong></li><li data-list-item-id="e468ae3db21e2fed8a5af1838949de655"><strong>Packages</strong>* (admin only)</li><li data-list-item-id="ea0938e7b43102cb1468fdf165fb587a4"><strong>Devel </strong>(admin only)</li></ul><p>The options marked with an <strong>*</strong> are only available for certain applications. You will never be able to edit or delete user specific applications (webprotege, nextcloud, jupyter).<br>If any of the other buttons are not showing you are probably viewing an application that consists of multiple components that each have their own Application Page.</p><h3>View</h3><p>The default view always shows the <strong>Machine Name</strong> as well as <strong>Health Status</strong> of the application.</p><p>Health Status indicators include:</p><ul><li data-list-item-id="e4376e977d11975b1331d985cba2405f5"><strong>Running</strong>: Application is operational and accessible</li><li data-list-item-id="e9cade2de05253178f93244977380159d"><strong>Starting</strong>: Application is being deployed or restarted</li><li data-list-item-id="e1f653036ab41f7b807e12ea51c0fcd48"><strong>Stopped</strong>: Application has been manually stopped</li><li data-list-item-id="e56952e4d93afa8b0d49bc9b4719eba34"><strong>Error</strong>: Application encountered an issue and requires attention</li></ul><p>For any WissKI Environment the View Page will also display if this instance has <strong>Automated Updates</strong> (admin setting only) turned on or off, whether it''s a <strong>Development instance</strong> (admin setting only) and what the <strong>Drupal/WissKI default language</strong> is.</p><p>Below these general information you will find a short <strong>Description </strong>of the Application.</p><p>Applications are always part of a <strong>Project</strong>. Generally this is your users <em>default project</em>, but custom Projects can be created and connected to any application.</p><p>Applications can also be comprised of multiple components. The Nextcloud for example always contains draw.io and Only Office as well. When viewing the application page of these types of combined applications there will also be a note on the singular applications that it contains (<strong>Included applications</strong>).</p><p>At the bottom you will find information on the <strong>Owner </strong>as well as the date that the application was <strong>Created </strong>and last <strong>Updated</strong>.</p><h3>Edit</h3><p>Editing the application allows you to change the <strong>Label </strong>(not the machine name!), manage which <strong>Project(s)</strong> have access to the application and to add <strong>Notes </strong>to it.</p><p>To modify an application''s configuration:</p><ol><li data-list-item-id="e9813f29125dcf7c536ca276dd2ad5b46">Click the "Edit" button in the task navigation.</li><li data-list-item-id="e4753f6e488585eeff1fc4e4f81cab0f9">Update the desired settings (note, project assignment, etc.)</li><li data-list-item-id="e4c1860db305ce2d3105705746a79dad8">Click "Save" to apply your changes</li></ol><p><strong>Note</strong>: Some technical settings may require redeployment. The system will notify you if this is necessary.</p><p>Projects help you organize related applications and collaborate with team members:</p><ol><li data-list-item-id="e409ec992e24fe69d8401e02a32e75999">Click "Edit"</li><li data-list-item-id="e873074e05599560c0ad6c0f69bc5798a">Select a project from the "Project" checklist</li><li data-list-item-id="ed606fb66861eb8be0ce4985c0a676009">Click "Save"</li></ol><p>Applications connected to projects are accessible to all project members. <a href="/docs/projects">Learn more about project management and how to create them.</a></p><h3>Show</h3><p>The "Show" button acts as a way to open and access certain applications itself. Clicking it will open the corresponding webapplication in a new browser tab.</p><h3>Snapshot</h3><p>Snapshots are point-in-time backups of applications and their data. The Snapshots button allows you to backup the application and data.</p><p>To modify an application''s configuration:</p><ol><li data-list-item-id="e3c562e94cc30cec2baa01388db1ee02f">Click the "Snapshot" button in the task navigation.</li><li data-list-item-id="e459632556093f77d1e90e2a107a782fe">Enter a Snapshot Label to name the Snapshot</li><li data-list-item-id="eac375ebde24631653608023fc8567d40">Click "Confirm" to create a new Snapshot</li></ol><p>To view and manage your existing Snapshots from all applications you will have to visit the <a href="https://scs.sammlungen.io/admin/structure/soda-scs-manager">Administration </a>section. You can learn more about the sites contained in that section in a <a href="/node/31">later part of this Documentation</a>.</p><h3>Delete</h3><p>Those applications that are availiable through the "Add Application" button <strong>can be deleted by</strong> the owner or <strong>any member of the Project</strong> that the application is assigned to at any point.</p><h3>Packages (admin only)</h3><p>This page is only available for WissKI Environments and provides an overview of the installed Drupal packages within the application.</p><p>It shows the package name, version, if an update is available and a short description of the package.</p><h3>Devel (admin only)</h3><p>The Devel page is provided by the <a href="https://www.drupal.org/project/devel">Drupal Devel module</a> and offers developers and inquisitive admins further insight.</p><h2>Additional Resources</h2><ul><li data-list-item-id="ebd851af0b0afc5e6ccfb88d945e70054"><a href="/node/37">Administration: How to create and manage Projects</a></li><li data-list-item-id="ee883f411ee49e61a37de31da77208609"><a href="/node/34">Administration: How to manage Snapshots</a></li><li data-list-item-id="ea231023354a93b723e26a7eace75ac65"><a href="/node/16">All available Applications</a><br>&nbsp;</li></ul><h3>&nbsp;</h3><p>&nbsp;</p>'
