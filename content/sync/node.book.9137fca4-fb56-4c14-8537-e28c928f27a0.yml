    body:
      value: '<h2>Kontext</h2><p>Ihre Anwendungen können über das <a href="/node/40">Dashboard</a> aufgerufen werden. Wenn Sie die Seite einer einzelnen Anwendung öffnen, können Sie diese nutzen und konfigurieren.</p><h2>Was Sie lernen werden</h2><ul><li data-list-item-id="e77c098c0a7f92d751890f9e05075ddb9">Wie man Anwendungen verwendet bzw. öffnet</li><li data-list-item-id="e1e03484faa24979f4812e1abf22463b2">Welche Möglichkeiten es gibt, mit SCS-Anwendungen zu interagieren</li></ul><h2>Voraussetzungen</h2><ul><li data-list-item-id="e2592693ee8f47e6a4a24561b6b4cbd1c">Ein aktives SCS-Benutzerkonto</li><li data-list-item-id="e15757b5f3d4dcc5f1e9e431ff9ca2f23">Kenntnisse zur Navigation im <a href="/node/40">Dashboard</a> oder zum Erstellen einer neuen Anwendung</li><li data-list-item-id="e850eea6ccc9060209e47452d70ed98d7">Verständnis des Unterschieds zwischen benutzerspezifischen Anwendungen und solchen, die über den "Applikation hinzufügen"-Button erstellt werden können</li></ul><h2>Die Anwendungsseite</h2><p>Nachdem Sie eine Anwendung erstellt haben oder über die Komponenten- bzw. Stackübersicht im <a href="/node/31">Administrationsbereich </a>zur Anwendungsseite navigiert sind, erhalten Sie einen Überblick über Ihre Anwendung und deren Konfiguration. Außerdem können Sie einige Einstellungen anpassen. Dies erfolgt über die verschiedenen Tabs, die oberhalb des Anwendungstitels angezeigt werden:</p><ul><li class="ck-list-marker-bold" data-list-item-id="e693856a96646a24cad1e74d2309098b0"><strong>Ansehen</strong></li><li class="ck-list-marker-bold" data-list-item-id="e5be3cae12c36d4addce3b4f9b76b0120"><strong>Bearbeiten*</strong></li><li data-list-item-id="ef145cdf65cdeb6e1f85b839b231df7d5"><strong>Anzeigen</strong>*</li><li data-list-item-id="e6ad7e5f3a4a2263e82c6dc6e16315802"><strong>Snapshot</strong>*</li><li class="ck-list-marker-bold" data-list-item-id="e8e73b03575d819cc5fef2e81ac3efda9"><strong>Löschen*</strong></li><li data-list-item-id="e227a9dc36838c2a5cb8e20ceb1b07ef4"><strong>Packages</strong>* (nur für Administratoren)</li><li data-list-item-id="e88b20ef205fbd7db301f545ffd4e08c5"><strong>Devel-Modul</strong> (nur für Administratoren)</li></ul><p>Die mit einem <strong>*</strong> gekennzeichneten Optionen sind nur für bestimmte Anwendungen verfügbar. Benutzerspezifische Anwendungen (z. B. WebProtégé, Nextcloud, Jupyter) können <strong>niemals bearbeitet oder gelöscht</strong> werden.<br>Wenn andere Schaltflächen nicht angezeigt werden, handelt es sich vermutlich um eine Anwendung, die aus mehreren Komponenten besteht, von denen jede eine eigene Anwendungsseite besitzt.</p><h3>Ansehen</h3><p>Die Standardansicht zeigt immer den <strong>Machinennamen</strong> sowie den <strong>Health Status</strong> der Anwendung an.</p><p>Die Health-Status-Indikatoren umfassen:</p><ul><li data-list-item-id="e2acb29586287bc89d7f3c9c845f2b72b"><strong>Running</strong>: Anwendung ist betriebsbereit und erreichbar</li><li data-list-item-id="e3fbfc668103f98bf07ab1ec2febbf28c"><strong>Starting</strong>: Anwendung wird bereitgestellt oder neu gestartet</li><li data-list-item-id="e2d2e2fb676f3f60d2e3611606755d2df"><strong>Stopped</strong>: Anwendung wurde manuell gestoppt</li><li data-list-item-id="e4eb5fb2cb0d126432fcc67e11e382db2"><strong>Error</strong>: Anwendung hat ein Problem festgestellt und erfordert Aufmerksamkeit</li></ul><h3>Bearbeiten</h3><p>Durch das Bearbeiten der Anwendung können Sie die <strong>Bezeichnung </strong>(nicht den Machinennamen!) ändern, verwalten, welche <strong>Projekte</strong> Zugriff auf die Anwendung haben, und <strong>Notizen</strong> hinzufügen.</p><h3>Anzeigen</h3><p>Die Schaltfläche „Anzeigen“ dient dazu, bestimmte Anwendungen direkt zu öffnen. Durch Klicken wird die entsprechende Webanwendung in einem neuen Browser-Tab geöffnet.</p><p>Bei einigen Anwendungen werden Sie aufgefordert, sich über „Sign in with Keycloak“ anzumelden. Dabei handelt es sich um den für SCS verwendeten Single-Sign-On-Dienst (SSO). Ein Klick genügt und Sie werden automatisch angemeldet.</p><h3>Snapshot</h3><p>Snapshots sind zeitpunktbezogene Sicherungen von Anwendungen und deren Daten. Über die Schaltfläche „Snapshot“ können Sie eine Sicherung der Anwendung und der Daten erstellen.</p><h3>Löschen</h3><p>Anwendungen, die über den "Applikation hinzufügen"-Button erstellt wurden, können jederzeit vom <strong>Eigentümer</strong> oder von <strong>jedem Mitglied des Projekts</strong>, dem die Anwendung zugewiesen ist, gelöscht werden.</p><h3>Packages (nur für Administratoren)</h3><p>Diese Seite ist nur für WissKI-Umgebungen verfügbar und bietet eine Übersicht über die in der Anwendung installierten Drupal-Pakete.</p><h3>Devel-Modul (nur für Administratoren)</h3><p>Die Devel-Seite wird vom <a href="https://www.drupal.org/project/devel">Drupal-Devel-Modul</a> bereitgestellt und bietet Entwicklern sowie neugierigen Administratoren zusätzliche Einblicke.</p><h2>Zusätzliche Ressourcen</h2><ul><li data-list-item-id="e8719f343fb4cdfcbfecdbd3c9f6c0797"><a href="/node/37">Administration: Projekte erstellen und verwalten</a></li><li data-list-item-id="eca265b1db64ecd4a862ad1855c24781f"><a href="/node/34">Administration: Snapshots verwalten</a></li><li data-list-item-id="e7c5854764833aad6669b87737d32f55e"><a href="/node/16">Alle verfügbaren Anwendungen</a></li></ul>'
      summary: ''
      format: basic_html
