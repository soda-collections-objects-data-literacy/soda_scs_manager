  body:
    value: '<h2>SODa SCS Stacks</h2><p>Stacks sind vorkonfigurierte Bündel von Komponenten, die zusammenarbeiten, um vollständige Forschungsumgebungen bereitzustellen. Der Stack-Verwaltungsbereich ermöglicht es Ihnen, diese integrierten Umgebungen auf der Plattform zu verwalten.</p><h3>Was Sie tun können</h3><ul><li>Alle bereitgestellten Stacks im System anzeigen</li><li>Stack-Konfigurationen und Komponentenverbindungen bearbeiten</li><li>Den Zustand aller Komponenten innerhalb eines Stacks überwachen</li><li>Stack-Mitgliedschaft und Zugriffsberechtigungen verwalten</li><li>Komponenten zu bestehenden Stacks hinzufügen oder entfernen</li><li>Ganze Stacks und ihre zugehörigen Komponenten löschen</li></ul><h3>Verwalten von Stacks</h3><p>So verwalten Sie Stacks:</p><ol><li>Navigieren Sie zu <strong>Administration → SODa SCS Stacks</strong></li><li>Zeigen Sie die Liste aller bereitgestellten Stacks an</li><li>Klicken Sie auf einen Stack, um seine enthaltenen Komponenten und Konfiguration zu sehen</li><li>Stack-Einstellungen bearbeiten oder Komponentenverbindungen ändern</li><li>Den Betriebsstatus aller Komponenten im Stack überwachen</li></ol><h3>Gängige Stack-Typen</h3><ul><li><strong>WissKI Stack</strong>: Vollständige Umgebung für Wissensrepräsentation mit Datenbank, Speicher und Webanwendung</li><li><strong>Benutzerdefinierte Stacks</strong>: Vom Benutzer erstellte Kombinationen von Komponenten, die auf spezifische Forschungsbedürfnisse zugeschnitten sind</li></ul>'
    summary: ''
    format: basic_html
