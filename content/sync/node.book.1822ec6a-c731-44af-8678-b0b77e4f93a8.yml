    body:
      value: '<h2>SODa SCS Stacks</h2><p>Stacks are pre-configured bundles of Components that work together to provide complete research environments. The Stacks administration area allows you to manage these integrated environments across the platform.</p><h3>What You Can Do</h3><ul><li>View all deployed stacks in the system</li><li>Edit stack configurations and Component connections</li><li>Monitor the health of all Components within a stack</li><li>Manage stack membership and access permissions</li><li>Add or remove Components from existing stacks</li><li>Delete entire stacks and their associated Components</li></ul><h3>Managing Stacks</h3><p>To manage stacks:</p><ol><li>Navigate to <strong>Administration → SODa SCS Stacks</strong></li><li>View the list of all deployed stacks</li><li>Click on a stack to see its included Components and configuration</li><li>Edit stack settings or modify Component connections</li><li>Monitor the operational status of all Components in the stack</li></ol><h3>Common Stack Types</h3><ul><li><strong>WissKI Stack</strong>: Complete knowledge representation environment with database, storage, and web application</li><li><strong>Custom Stacks</strong>: User-created combinations of Components tailored to specific research needs</li></ul>'
      summary: ''
      format: basic_html
