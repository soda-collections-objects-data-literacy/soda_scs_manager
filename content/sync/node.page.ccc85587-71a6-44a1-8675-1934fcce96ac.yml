    value: '<h2>Information pursuant to Section 5 of the German Telemedia Act (TMG):</h2><p>NAME<br>ADRESSE</p><p>Contact:<br>Email:<br>EMAIL</p><h2>Responsible for content in accordance with Section 55 (2) RStV:<br>NAME</h2><p>ADRESSE</p><h2>Information on data processing</h2><p>Collection and storage of personal data, type and purpose of use<br>We collect connection data for the purpose of providing information on our website. We also have a contact form, which is used to process data for the purpose of contacting you. The provision of data in the form is voluntary.</p><p>Data processing is carried out at your request and is necessary for the purposes stated in accordance with Art. 6 (1) (b) GDPR for appropriate processing.</p><p>Transfer of data to third parties<br>Your personal data will not be transferred to third parties for purposes other than those listed below. Insofar as this is necessary for the processing of contractual and business relationships with you in accordance with Art. 6 (1) (b) GDPR, your personal data will be passed on to third parties. The data disclosed may only be used by the third party for the purposes specified.</p><h2>Rights of data subjects</h2><p>You have the right:<br>pursuant to Art. 7(3) GDPR to withdraw your consent from us at any time. As a result, we will no longer be permitted to continue processing data based on this consent in the future;<br>pursuant to Art. 15 GDPR to request information about your personal data processed by us. In particular, you may obtain information about the purposes of processing, the category of personal data, the categories of recipients to whom your data has been or will be disclosed, the planned storage period, the existence of a right to rectification, deletion, restriction of processing or objection, the existence of a right of appeal, the origin of your data, if it was not collected by us, and the existence of automated decision-making, including profiling and, if applicable, meaningful information about its detail.</p><p>Pursuant to Art. 16 GDPR, to request the immediate correction of inaccurate or incomplete personal data stored by us;<br>to request the erasure of your personal data stored by us in accordance with Art. 17 GDPR, unless the processing is necessary for exercising the right of freedom of expression and information, for compliance with a legal obligation, for reasons of public interest or for the establishment, exercise or defence of legal claims;<br>to request the restriction of the processing of your personal data in accordance with Art. 18 GDPR, unless the accuracy of the data is disputed by you, the processing is unlawful, but you refuse to have it deleted and we no longer need the data, but you need it to assert, exercise or defend legal claims, or you have lodged an objection to the processing in accordance with Art. 21 GDPR;<br>pursuant to Art. 20 GDPR, to receive your personal data that you have provided to us in a structured, commonly used and machine-readable format or to request its transfer to another controller; and<br>pursuant to Art. 77 GDPR, to lodge a complaint with a supervisory authority. As a rule, you can contact the supervisory authority of your usual place of residence or workplace or our company headquarters for this purpose.</p><h2>Right to object</h2><p>If your personal data is processed on the basis of legitimate interests pursuant to Art. 6 (1) (f) GDPR, you have the right to object to the processing of your personal data pursuant to Art. 21 GDPR, provided that there are reasons for this arising from your particular situation.</p><h2>Disclaimer:</h2><h3>Liability for content</h3><p>The content of our pages has been created with the utmost care.<br>However, we cannot guarantee the accuracy, completeness and timeliness of the content. As a service provider, we are responsible for our own content on these pages in accordance with § 7 para. 1 TMG (German Telemedia Act) and general laws. However, according to Sections 8 to 10 TMG, we are not obliged as a service provider to monitor transmitted or stored third-party information or to investigate circumstances that indicate illegal activity. Obligations to remove or block the use of information in accordance with general laws remain unaffected by this. However, liability in this regard is only possible from the time we become aware of a specific legal violation. If we become aware of such legal violations, we will remove this content immediately.</p><h3>Liability for links</h3><p>Our website contains links to external third-party websites over whose content we have no influence. Therefore, we cannot accept any liability for this external content. The respective provider or operator of the linked pages is always responsible for their content. The linked pages were checked for possible legal violations at the time of linking. No illegal content was found at the time of linking. However, permanent monitoring of the content of the linked pages is not reasonable without concrete evidence of a violation of the law. If we become aware of any infringements, we will remove such links immediately.</p><h3>Copyright</h3><p>The content and works on these pages created by the site operators are subject to German copyright law. The reproduction, editing, distribution and any kind of use outside the limits of copyright law require the written consent of the respective author or creator. Downloads and copies of this site are only permitted for private, non-commercial use. Insofar as the content on this site was not created by the operator, the copyrights of third parties are respected. In particular, third-party content is identified as such. Should you nevertheless become aware of a copyright infringement, please inform us accordingly. Upon becoming aware of legal violations, we will remove such content immediately.</p><h3>Data protection</h3><p>It is generally possible to use our website without providing personal data. Where personal data (e.g. name,<br>address or email addresses) is collected on our website, this is always done on a voluntary basis as far as possible. This data will not be passed on to third parties without your express consent.</p><p>We would like to point out that data transmission over the Internet (e.g. when communicating by e-mail) can have security gaps. Complete protection of data against access by third parties is not possible.</p><p>We hereby expressly object to the use of contact data published within the scope of the imprint obligation by third parties for sending unsolicited advertising and information materials. The operators of the pages expressly reserve the right to take legal action in the event of unsolicited sending of advertising information, for example through spam emails.</p><h3><strong>Integration of External Services</strong></h3><p>This website uses the following external services, which may process personal data (in particular your IP address):</p><p><strong>Leaflet / OpenStreetMap</strong> For interactive maps, we use Leaflet with map data provided by OpenStreetMap (Open Street Map Foundation, St John''s Innovation Centre, Cowley Road, Cambridge, CB4 0WS, UK). When maps are loaded, your IP address is transmitted to OpenStreetMap Foundation servers. The legal basis is Art. 6 (1) (f) GDPR (legitimate interest in the functional display of geographic data). Privacy policy: <a href="https://wiki.osmfoundation.org/wiki/Privacy_Policy">https://wiki.osmfoundation.org/wiki/Privacy_Policy</a></p><p><strong>GND (Integrated Authority File) / German National Library</strong> To link authority data, we use the GND of the German National Library (DNB), Adickesallee 1, 60322 Frankfurt am Main, Germany. When authority data is retrieved, your IP address may be transmitted. Privacy policy: <a href="https://www.dnb.de/datenschutz">https://www.dnb.de/datenschutz</a></p><p><strong>GeoNames</strong> For geographic names and coordinates, we use the GeoNames service (GeoNames, Rue de la Pontaise 54, 1014 Lausanne, Switzerland). When queries are made, your IP address is transmitted to GeoNames servers. The legal basis is Art. 6 (1) (f) GDPR. Privacy policy: <a href="https://www.geonames.org/privacy.html">https://www.geonames.org/privacy.html</a></p>'
