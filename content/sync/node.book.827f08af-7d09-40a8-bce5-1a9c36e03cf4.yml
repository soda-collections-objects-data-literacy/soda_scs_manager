  body:
    value: '<h2>Context</h2><p>Welcome to the SODa Semantic Co-Working Space! This guide will help you take your first steps in using the SCS Manager to deploy and manage research infrastructure for academic university collections.</p><h2>What you''ll learn</h2><p>The Getting Started section covers the essential steps to begin working with the SCS:</p><ol><li><strong>Creating your account</strong> - Set up your SCS Manager account to access all available services</li><li><strong>Deploying your first application</strong> - Launch a WissKI environment and start working with your research data</li></ol><h2>Prerequisites</h2><p>None.</p><h2>Your Journey</h2><p>Follow these steps in order to get up and running:</p><h3>Step 1: Create Your Account</h3><p>Start by <a href="https://scs.sammlungen.io/docs/getting-started/account" data-entity-type="external">creating an account</a>. This is required to access most of the SCS features. Once your account is approved by our administrators, you''ll receive a confirmation email and can proceed to log in.</p><h3>Step 2: Deploy Your First Application</h3><p>After logging in, learn how to <a href="/docs/getting-started/1st-app">get your first application running</a>. We''ll walk you through deploying a WissKI environment, which includes everything you need to start managing your research data.</p><h2>What''s Next?</h2><p>Once you''ve completed these initial steps, you can explore:</p><ul><li><a href="/docs/interface">The interface</a> - Learn about the Catalogue, Dashboard, and Administration areas</li><li><a href="/node/16" data-entity-type="node" data-entity-uuid="f5ec0346-0274-4099-8e3c-ae87b07d6e52" data-entity-substitution="canonical">Available applications</a> - Discover all the tools and services at your disposal</li><li><a href="/node/37" data-entity-type="node" data-entity-uuid="8cb182c1-0541-40dc-b316-977b1c587ff8" data-entity-substitution="canonical">Projects </a>- Organize your applications and collaborate with others</li><li><a href="/node/34" data-entity-type="node" data-entity-uuid="4f1dfad5-26ad-4fb7-9da5-82689597bc16" data-entity-substitution="canonical">Snapshots</a> - Back up and restore your work</li></ul><h3>Need Help?</h3><p>If you encounter any issues or have questions, please <a href="mailto:scs-manager@sammlungen.io">contact your system administrator</a>.</p>'
    summary: ''
    format: basic_html
