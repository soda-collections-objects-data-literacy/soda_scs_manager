    body:
      value: '<h2>SODa SCS Snapshots</h2><p>Snapshots are point-in-time backups of applications and their data. The Snapshots administration area allows you to manage backup and restore operations across the entire platform.</p><h3>What You Can Do</h3><ul><li>View all snapshots created across the system</li><li>Create manual snapshots of any application</li><li>Schedule automatic snapshot creation</li><li>Restore applications to previous states</li><li>Delete old or unnecessary snapshots to free storage</li><li>Export snapshots for archival or migration purposes</li></ul><h3>Managing Snapshots</h3><p>To manage snapshots:</p><ol><li>Navigate to <strong>Administration → SODa SCS Snapshots</strong></li><li>Browse all available snapshots organized by application</li><li>Filter by date, application type, or owner</li><li>Click "Create Snapshot" to back up an application</li><li>Select "Restore" to revert an application to a snapshot state</li><li>Use "Delete" to remove outdated snapshots</li></ol><h3>Snapshot Best Practices</h3><ul><li><strong>Regular backups</strong>: Create snapshots before major changes or updates</li><li><strong>Retention policy</strong>: Define how long to keep snapshots</li><li><strong>Test restores</strong>: Periodically verify that snapshots can be restored successfully</li><li><strong>Document snapshots</strong>: Add notes about what each snapshot contains</li><li><strong>Storage management</strong>: Clean up old snapshots to conserve resources</li></ul>'
      summary: ''
      format: basic_html
