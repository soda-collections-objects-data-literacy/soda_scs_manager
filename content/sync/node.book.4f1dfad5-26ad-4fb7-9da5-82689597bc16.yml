  body:
    value: '<h2>SODa SCS Snapshots</h2><p>Snapshots sind zeitpunktbezogene Backups von Anwendungen und ihren Daten. Der Snapshot-Verwaltungsbereich ermöglicht es Ihnen, Backup- und Wiederherstellungsvorgänge auf der gesamten Plattform zu verwalten.</p><h3>Was Sie tun können</h3><ul><li>Alle im System erstellten Snapshots anzeigen</li><li>Manuelle Snapshots beliebiger Anwendungen erstellen</li><li>Automatische Snapshot-Erstellung planen</li><li>Anwendungen in frühere Zustände wiederherstellen</li><li>Alte oder unnötige Snapshots löschen, um Speicher freizugeben</li><li>Snapshots für Archivierungs- oder Migrationszwecke exportieren</li></ul><h3>Verwalten von Snapshots</h3><p>So verwalten Sie Snapshots:</p><ol><li>Navigieren Sie zu <strong>Administration → SODa SCS Snapshots</strong></li><li>Durchsuchen Sie alle verfügbaren Snapshots, nach Anwendung organisiert</li><li>Filtern Sie nach Datum, Anwendungstyp oder Eigentümer</li><li>Klicken Sie auf "Snapshot erstellen", um eine Anwendung zu sichern</li><li>Wählen Sie "Wiederherstellen", um eine Anwendung in einen Snapshot-Zustand zurückzusetzen</li><li>Verwenden Sie "Löschen", um veraltete Snapshots zu entfernen</li></ol><h3>Snapshot-Best-Practices</h3><ul><li><strong>Regelmäßige Backups</strong>: Erstellen Sie Snapshots vor größeren Änderungen oder Updates</li><li><strong>Aufbewahrungsrichtlinie</strong>: Definieren Sie, wie lange Snapshots aufbewahrt werden sollen</li><li><strong>Wiederherstellungen testen</strong>: Überprüfen Sie regelmäßig, dass Snapshots erfolgreich wiederhergestellt werden können</li><li><strong>Snapshots dokumentieren</strong>: Fügen Sie Notizen hinzu, was jeder Snapshot enthält</li><li><strong>Speicherverwaltung</strong>: Alte Snapshots aufräumen, um Ressourcen zu schonen</li></ul>'
    summary: ''
    format: basic_html
