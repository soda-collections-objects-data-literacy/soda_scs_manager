    body:
      value: '<h2>SODa SCS Projekte</h2><p>Projekte sind kollaborative Frameworks, die verwandte Anwendungen und Teammitglieder zusammenführen. Der Projektverwaltungsbereich bietet Werkzeuge zur Überwachung aller Forschungsprojekte auf der Plattform.</p><h3>Was Sie tun können</h3><ul><li>Alle Projekte im System anzeigen, unabhängig von der Mitgliedschaft</li><li>Neue Projekte für Benutzer oder Teams erstellen</li><li>Projektdetails, Beschreibungen und Einstellungen bearbeiten</li><li>Projektmitgliedschaft und Zugriffsberechtigungen verwalten</li><li>Anzeigen, welche Anwendungen mit jedem Projekt verbunden sind</li></ul><h3>Verwalten von Projekten</h3><p>So verwalten Sie Projekte:</p><ol><li>Navigieren Sie zu <strong>Administration → SODa SCS Projekte</strong></li><li>Zeigen Sie die vollständige Liste aller Projekte an</li><li>Klicken Sie auf ein Projekt, um seine Mitglieder und verbundenen Anwendungen zu sehen</li><li>Teammitglieder zu Projekten hinzufügen oder entfernen</li><li>Projekteinstellungen und -berechtigungen ändern</li></ol><h3>Best Practices für die Projektorganisation</h3><ul><li>Verwandte Anwendungen innerhalb des selben Projekts gruppieren</li><li>Klare Projekteigentümerschaft und -verantwortlichkeiten zuweisen</li><li>Projektmitgliedschaft regelmäßig überprüfen, um angemessenen Zugriff sicherzustellen</li><li>Beschreibende Projektnamen verwenden, die Zweck und Umfang angeben</li></ul>'
      summary: ''
      format: basic_html
