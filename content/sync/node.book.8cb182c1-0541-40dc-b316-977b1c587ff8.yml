  body:
    value: '<h2>SODa SCS Projects</h2><p>Projects are collaborative frameworks that group related applications and team members together. The Projects administration area provides tools for overseeing all research projects across the platform.</p><h3>What You Can Do</h3><ul><li>View all projects in the system, regardless of membership</li><li>Create new projects for users or teams</li><li>Edit project details, descriptions, and settings</li><li>Manage project membership and access permissions</li><li>View which applications are connected to each project</li></ul><h3>Managing Projects</h3><p>To manage projects:</p><ol><li>Navigate to <strong>Administration → SODa SCS Projects</strong></li><li>View the complete list of all projects</li><li>Click on a project to see its members and connected applications</li><li>Add or remove team members from projects</li><li>Modify project settings and permissions</li></ol><h3>Project Organization Best Practices</h3><ul><li>Group related applications within the same project</li><li>Assign clear project ownership and responsibilities</li><li>Regularly review project membership to ensure appropriate access</li><li>Use descriptive project names that indicate purpose and scope</li></ul>'
    summary: ''
    format: basic_html
