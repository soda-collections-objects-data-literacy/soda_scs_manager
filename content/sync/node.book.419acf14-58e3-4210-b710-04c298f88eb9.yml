  body:
    value: '<h2>Context</h2><p>The Interface section explains the main areas of the SODa SCS Manager web interface. Understanding these three key areas—Documentation, Dashboard, and Administration—enables you to effectively deploy, manage, and oversee applications throughout your research workflow.</p><h2>Goals</h2><ul><li data-list-item-id="e610f5ff6bf1cd226a199edd94e73afd5">Understand the purpose of each interface area</li><li data-list-item-id="e302e04adf344bcfc3257260abe9e4852">Know where to go for specific tasks</li><li data-list-item-id="e9abe82c8b014ee3b65086d9c28cebc26">Navigate efficiently between different management functions</li></ul><h2>Prerequisites</h2><ul><li data-list-item-id="e2dea9d7e661c6ca0054d144c9ffa0c7b">An active SODa SCS Manager account</li><li data-list-item-id="eadbf713d22db2af87d48600e7127943f">Completion of <a href="/soda-scs-manager/documentation/getting-started">Getting Started</a></li></ul><h2>Interface Areas</h2><h3><a href="/soda-scs-manager/documentation/dashboard">Dashboard</a></h3><p>Your central hub for managing applications. View all your applications, monitor their health, access their interfaces, and organize them into projects or browse available services, select what you need, and create new instances with just a few clicks.</p><p><strong>Use the Dashboard when you want to:</strong>&nbsp;</p><ul><li data-list-item-id="ed8f63ccc1f8ae58767ea56f6a948d34a">Access running applications</li><li data-list-item-id="e6dd5ed038b42f3fe69c695aeda6d835f">check application status</li><li data-list-item-id="e707c389b834fffea00ad1b08ef8ad4fe">edit configurations</li><li data-list-item-id="e4028f0d726d6746b95c06ef1944acd12">or manage your deployments.</li></ul><p><strong>Use the "Add Application" button at the top of the "Your Applications" section to:</strong></p><ul><li data-list-item-id="ef0eacfe7ae04b4a25d614ed550ec90a7">Deploy new applications</li><li data-list-item-id="ee3b6169d60e38fd47b4d5ce60a403889">explore available services</li><li data-list-item-id="e78efbc8141fdf1e26dc9997c737564f6">or learn about application features.</li></ul><h3><a href="/soda-scs-manager/documentation/interface/admin">Administration</a></h3><p>System-wide management tools for components, projects, service keys, snapshots, and stacks. Provides comprehensive oversight and control across the entire platform.</p><p><strong>Use Administration when you want to:</strong> Manage security credentials, create backups, oversee projects, or perform advanced administrative tasks.</p><h2>Navigation Tips</h2><ul><li data-list-item-id="ebbf61237836474dddfd761b368ea8711">The main navigation menu provides quick access to all interface areas (Documentation, Dashboard, Administration)</li><li data-list-item-id="e5fa7b83dc274ce660be9609eed4b054d">On the Dashboard, use the ‘Add Application’ button to deploy applications and the details view (accessible through the magnifying glass) to manage them</li><li data-list-item-id="ebf0bb7b7df149be4b494e3ef59fa7305">To monitor applications and manage projects, use the Administration section</li></ul><h2>Additional Resources</h2><ul><li data-list-item-id="ebaef9a319cb29cbb85b99fe4f872e1a9"><a href="/soda-scs-manager/documentation/getting-started/1st-app">Deploy Your First Application</a></li><li data-list-item-id="e676635b8b77b3c5f6443a661e5805f2c"><a href="/soda-scs-manager/documentation/apps">Available Applications</a></li><li data-list-item-id="e9f78d36a480d6a03d62b5662238d514e"><a href="/soda-scs-manager/documentation/projects">Managing Projects</a></li><li data-list-item-id="e3770fa545fd8b5b4db43be7153ad1233"><a href="/soda-scs-manager/documentation/snapshots">Working with Snapshots</a></li></ul>'
