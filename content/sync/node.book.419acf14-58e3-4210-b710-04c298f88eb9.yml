    body:
      value: '<h2>Kontext</h2><p>Der Abschnitt "Benutzeroberfläche" erklärt die Hauptbereiche der SODa SCS Manager-Weboberfläche. Das Verständnis dieser drei Schlüsselbereiche—Dokumentation, Dashboard und Administration—ermöglicht es Ihnen, Anwendungen effektiv bereitzustellen, zu verwalten und während Ihres gesamten Forschungsworkflows zu überwachen.</p><h2>Ziele</h2><ul><li data-list-item-id="e357f448ea8597eb54be44a0bcfc30083">Verstehen Sie den Zweck jedes Oberflächenbereichs</li><li data-list-item-id="ed7db8fea7ac98d7a7f72ee9ca4d53400">Wissen, wohin Sie für bestimmte Aufgaben gehen müssen</li><li data-list-item-id="ed863d748a57ac5cede0c4601133fb7fa">Effizient zwischen verschiedenen Verwaltungsfunktionen navigieren</li></ul><h2>Voraussetzungen</h2><ul><li data-list-item-id="e9660516f47fd6e048d36051f39a75142">Ein aktives SODa SCS Manager-Konto</li><li data-list-item-id="e0a438e3ab6495f64b97425843b0b610c">Abschluss von <a href="/soda-scs-manager/documentation/getting-started">Erste Schritte</a></li></ul><h2>Verschiedene Bereiche der Nutzeroberfläche</h2><h3><a href="/soda-scs-manager/documentation/dashboard">Dashboard</a></h3><p>Ihre zentrale Übersicht zur Verwaltung von Anwendungen. Hier sehen Sie alle Ihre Anwendungen, können deren Status überwachen, auf ihre Benutzeroberflächen zugreifen und die Anwendungen in Projekten organisieren. Sie können außerdem verfügbare Dienste durchsuchen, passende Anwendungen auswählen und mit wenigen Klicks neue Instanzen erstellen.</p><p><strong>Verwenden Sie das Dashboard, wenn Sie:</strong>&nbsp;</p><ul><li data-list-item-id="ed8f63ccc1f8ae58767ea56f6a948d34a">auf laufende Anwendungen zugreifen möchten</li><li data-list-item-id="e6dd5ed038b42f3fe69c695aeda6d835f">den Status von Anwendungen überprüfen möchten</li><li data-list-item-id="e707c389b834fffea00ad1b08ef8ad4fe">Konfigurationen bearbeiten möchten</li><li data-list-item-id="e4028f0d726d6746b95c06ef1944acd12">oder Ihre Deployments verwalten möchten.</li></ul><p><strong>Verwenden Sie die Schaltfläche „Add Application“ im Abschnitt „Your Applications“, um:</strong></p><ul><li data-list-item-id="ef0eacfe7ae04b4a25d614ed550ec90a7">neue Anwendungen bereitzustellen</li><li data-list-item-id="ee3b6169d60e38fd47b4d5ce60a403889">verfügbare Dienste zu entdecken</li><li data-list-item-id="e78efbc8141fdf1e26dc9997c737564f6">oder mehr über die Funktionen der Anwendungen zu erfahren.</li></ul><h3><a href="/soda-scs-manager/documentation/interface/admin">Administration</a></h3><p>Systemweite Verwaltungswerkzeuge für Komponenten, Projekte, Service-Keys, Snapshots und Stacks. Bietet umfassende Übersicht und Kontrolle über die gesamte Plattform.</p><p><strong>Verwenden Sie die Administration, wenn Sie:</strong> Sicherheitsanmeldedaten verwalten, Backups erstellen, Projekte überwachen oder erweiterte administrative Aufgaben durchführen möchten.</p><h2>Navigationstipps</h2><ul><li data-list-item-id="e77cf3a81940400f8000a2949011c9c04">Das Hauptnavigationsmenü bietet schnellen Zugriff auf alle Oberflächenbereiche (Dokumentation, Dashboard, Administration)</li><li data-list-item-id="e3f71b65b503697cc59f3c202d146d017">Verwenden Sie auf dem Dashboard den "Applikation hinzufügen"-Button zum Bereitstellen und die Detailansicht (erreichbar über die Lupe) zum Verwalten von Applikationen.&nbsp;</li><li data-list-item-id="e12b548331909abf7a9bfe75f30175b26">Zur Überwachung von Applikationen und Verwaltung von Projekten nutzen Sie die Administration</li></ul><h2>Zusätzliche Ressourcen</h2><ul><li data-list-item-id="e1f959c96de0f26afc45dd0f1457750f3"><a href="/soda-scs-manager/documentation/getting-started/1st-app">Stellen Sie Ihre erste Anwendung bereit</a></li><li data-list-item-id="e61853438c726d1e97058a0ba44529f05"><a href="/soda-scs-manager/documentation/apps">Verfügbare Anwendungen</a></li><li data-list-item-id="eac68e6c4370c8e22aef897066a90fa07"><a href="/soda-scs-manager/documentation/projects">Projekte verwalten</a></li><li data-list-item-id="ee0a2cd80ad385b021fa057c3b2c98a82"><a href="/soda-scs-manager/documentation/snapshots">Arbeiten mit Snapshots</a></li></ul>'
      summary: ''
